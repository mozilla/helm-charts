---
name: Bump chart versions and commit
description: >-
  Bumps the specified chart versions (with cascade), regenerates helm-docs,
  and commits the result to the current branch.

inputs:
  chart-paths:
    description: Space-separated chart paths to bump (e.g. mozcloud/application mozcloud-ingress/library)
    required: true
  release-type:
    description: Semver part to increment (major, minor, patch)
    required: true

outputs:
  sha:
    description: SHA of the resulting commit (or HEAD if nothing changed)
    value: ${{ steps.commit.outputs.sha }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      shell: bash
      run: pip install uv

    - name: Install helm-docs
      shell: bash
      run: |
        HELM_DOCS_VERSION=1.14.2
        curl -sSL \
          "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" \
          | tar -xz helm-docs
        sudo mv helm-docs /usr/local/bin/

    - name: Bump chart versions
      id: bump
      shell: bash
      env:
        CHART_PATHS: ${{ inputs.chart-paths }}
        RELEASE_TYPE: ${{ inputs.release-type }}
      run: |
        uv run --directory ./scripts chartkit version bump \
          --release-type "${RELEASE_TYPE}" \
          --format json \
          ${CHART_PATHS} | tee bump-result.json

    - name: Update helm docs
      shell: bash
      run: helm-docs --template-files=./_README.md.gotmpl --template-files=README.md.gotmpl

    - name: Commit and push
      id: commit
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          DETAILS=$(jq -r '.updated[] | "- \(.name): \(.previous_version) -> \(.version)"' bump-result.json)
          git commit -m "chore: bump chart versions and update docs [skip ci]

${DETAILS}"
          git push
        fi
        echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
