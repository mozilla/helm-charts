---
name: Commit, push, and create GitHub release
description: >-
  Commits and pushes version bump changes to the current branch, then creates
  a GitHub release (and corresponding tag) for each published chart.

inputs:
  app-id:
    description: GitHub App ID, used to form the bot committer email
    required: true
  chart-tags:
    description: Space-separated list of chart tags to create
    required: true
  github-token:
    description: GitHub token for push and release creation
    required: true
  release-notes:
    description: Body text for each GitHub Release (e.g. the PR description)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Commit and push
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        git config user.name "mozcloud-release-bot[bot]"
        git config user.email "${{ inputs.app-id }}+mozcloud-release-bot[bot]@users.noreply.github.com"
        git add "**/Chart.yaml" "**/README.md"
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          DETAILS=$(jq -r '.updated[] | "- \(.name): \(.previous_version) -> \(.version)"' bump-result.json)
          git commit -m "$(printf 'chore: bump chart versions and update docs [skip ci]\n\n%s' "${DETAILS}")"
          git push
        fi

    - name: Create releases
      shell: bash
      env:
        CHART_TAGS: ${{ inputs.chart-tags }}
        GH_TOKEN: ${{ inputs.github-token }}
        RELEASE_NOTES: ${{ inputs.release-notes }}
      run: |
        for TAG in ${CHART_TAGS}; do
          echo "Creating release \"${TAG}\""
          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "${TAG}" \
            --notes "${RELEASE_NOTES}"
        done
