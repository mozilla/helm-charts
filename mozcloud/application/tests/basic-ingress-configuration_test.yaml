---
suite: "mozcloud: Basic ingress configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/basic-ingress-configuration.yaml
templates:
  - gateway/gateway.yaml
  - gke/frontendconfig.yaml
  - gke/ingress.yaml
  - ingress/ingress.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: BackendConfig, FrontendConfig, Ingress, ManagedCertificate, and Services are configured correctly
    asserts:
      # Backend is configured correctly
      - isSubset:
          path: spec
          content:
            logging:
              enable: true
              sampleRate: 0.1
        template: gke/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "BackendConfig")].metadata.name
          value: test-service
      # Frontend is configured correctly
      - isSubset:
          path: spec
          content:
            redirectToHttps:
              enabled: true
              responseCodeName: MOVED_PERMANENTLY_DEFAULT
            sslPolicy: mozilla-intermediate
        template: gke/frontendconfig.yaml
        documentSelector:
          path: $[?(@.kind == "FrontendConfig")].metadata.name
          value: test-service
      # Ingress is configured correctly
      - isSubset:
          path: metadata.annotations
          content:
            kubernetes.io/ingress.class: gce
            kubernetes.io/ingress.global-static-ip-name: mozcloud-dev-ip-v4
            networking.gke.io/managed-certificates: mcrt-test-service-dev-test-domain-com
            networking.gke.io/v1beta1.FrontendConfig: test-service
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      - isSubset:
          path: spec
          content:
            defaultBackend:
              service:
                name: test-service
                port:
                  number: 8080
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      # Managed certificate is configured correctly
      - lengthEqual:
          path: spec.domains
          count: 1
        template: gke/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "ManagedCertificate")].metadata.name
          value: mcrt-test-service-dev-test-domain-com
      - contains:
          path: spec.domains
          content: "test-service.dev.test-domain.com"
        template: gke/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "ManagedCertificate")].metadata.name
          value: mcrt-test-service-dev-test-domain-com
      # Service is configured correctly
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - exists:
          path: spec.selector
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - isNotNullOrEmpty:
          path: spec.selector
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - equal:
          path: spec.type
          value: ClusterIP
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      # Service for nginx-disabled workload routes to explicit targetPort
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: web-server
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: nginx-disabled-service
