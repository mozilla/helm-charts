---
suite: "mozcloud: Ingress multi-domain configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/ingress-multi-domain-configuration.yaml
templates:
  - gke/ingress.yaml
  - ingress/ingress.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Ingress uses rules per domain and a shared BackendConfig across all domains
    asserts:
      # Ingress uses rules instead of defaultBackend for multiple domains
      - exists:
          path: spec.rules
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      - notExists:
          path: spec.defaultBackend
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      # Ingress has one rule per domain
      - lengthEqual:
          path: spec.rules
          count: 2
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      # First domain has its own ingress rule
      - equal:
          path: spec.rules[0].host
          value: test-service.dev.test-domain.com
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      # Second domain has its own ingress rule
      - equal:
          path: spec.rules[1].host
          value: www.test-service.dev.test-domain.com
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      # A single BackendConfig is shared across all domains
      - hasDocuments:
          count: 3
        template: gke/ingress.yaml
      - equal:
          path: kind
          value: BackendConfig
        documentIndex: 0
        template: gke/ingress.yaml
