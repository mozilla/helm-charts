---
suite: "mozcloud: Ingress multi-domain configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/ingress-multi-domain-configuration.yaml
templates:
  - gke/ingress.yaml
  - ingress/ingress.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: Ingress uses rules instead of defaultBackend for multiple domains
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-service
    asserts:
      - exists:
          path: spec.rules
      - notExists:
          path: spec.defaultBackend
  - it: Ingress has one rule per domain
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-service
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 2
  - it: First domain has its own ingress rule
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.rules[0].host
          value: test-service.dev.test-domain.com
  - it: Second domain has its own ingress rule
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.rules[1].host
          value: www.test-service.dev.test-domain.com
  - it: A single BackendConfig is shared across all domains
    template: gke/ingress.yaml
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: kind
          value: BackendConfig
        documentIndex: 0
