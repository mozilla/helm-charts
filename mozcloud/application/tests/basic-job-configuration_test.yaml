---
suite: "mozcloud: Basic job configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/basic-job-configuration.yaml
templates:
  - task/job.yaml
  - gke/podmonitoring.yaml
tests:
  - it: PodMonitoring should not render when no workloads are defined
    template: gke/podmonitoring.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Pre- and post-deployment Jobs are configured correctly
    template: task/job.yaml
    asserts:
      # Pre-deployment job is configured correctly
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: Sync
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
          value: BeforeHookCreation,HookSucceeded
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-1"
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.backoffLimit
          value: 6
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.parallelism
          value: 1
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.template.spec.containers[0].image
          value: test-repo/test-predeployment-job-image:2.0.0
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["sh", "-c"]
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["echo", "running", "before", "deployment"]
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.template.spec.containers[0].name
          value: job
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - exists:
          path: spec.template.spec.containers[0].resources
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - isSubset:
          path: spec.template.spec.containers[0].resources
          content:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - exists:
          path: spec.template.spec.containers[0].securityContext
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - isSubset:
          path: spec.template.spec.containers[0].securityContext
          content:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - exists:
          path: spec.template.spec.securityContext
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      - isSubset:
          path: spec.template.spec.securityContext
          content:
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-predeployment-job
      # Post-deployment job is configured correctly
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook"]
          value: Sync
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
          value: BeforeHookCreation,HookSucceeded
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "1"
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.backoffLimit
          value: 6
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.parallelism
          value: 1
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.template.spec.containers[0].image
          value: test-repo/test-postdeployment-job-image:3.0.0
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["sh", "-c"]
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.template.spec.containers[0].args
          value: ["echo", "running", "after", "deployment"]
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.template.spec.containers[0].name
          value: job
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - exists:
          path: spec.template.spec.containers[0].resources
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - isSubset:
          path: spec.template.spec.containers[0].resources
          content:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - exists:
          path: spec.template.spec.containers[0].securityContext
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - isSubset:
          path: spec.template.spec.containers[0].securityContext
          content:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - exists:
          path: spec.template.spec.securityContext
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
      - isSubset:
          path: spec.template.spec.securityContext
          content:
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
        documentSelector:
          path: $[?(@.kind == "Job")].metadata.name
          value: test-postdeployment-job
