---
suite: "mozcloud: Disabled job is suppressed"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/job-disabled.yaml
templates:
  - task/job.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Disabled job is not rendered; enabled job is rendered
    template: task/job.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: test-enabled-job
        documentIndex: 0
