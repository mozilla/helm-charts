---
suite: "mozcloud: Basic cron job configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/basic-cronjob-configuration.yaml
templates:
  - task/cronjob.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}

  - it: CronJob renders without failures and is configured correctly
    template: task/cronjob.yaml
    asserts:
      - notFailedTemplate: {}
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/hook"]
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/hook-delete-policy"]
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - notExists:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.concurrencyPolicy
          value: Allow
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - matchRegex:
          path: spec.schedule
          pattern: ^(0 \* \* \* \*|@hourly)$
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 1
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 1
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 6
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.parallelism
          value: 1
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - lengthEqual:
          path: spec.jobTemplate.spec.template.spec.containers
          count: 1
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: test-repo/test-image:latest
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].command
          value: ["sh", "-c"]
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].args
          value: ["echo", "foo", "bar"]
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].name
          value: job
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - isSubset:
          path: spec.jobTemplate.spec.template.spec.containers[0].resources
          content:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - exists:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - isSubset:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext
          content:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - exists:
          path: spec.jobTemplate.spec.template.spec.securityContext
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
      - isSubset:
          path: spec.jobTemplate.spec.template.spec.securityContext
          content:
            runAsGroup: 10001
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
        documentSelector:
          path: $[?(@.kind == "CronJob")].metadata.name
          value: test-cronjob
