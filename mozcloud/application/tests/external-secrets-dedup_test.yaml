---
suite: "mozcloud: External secrets deduplication"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/external-secrets-dedup.yaml
templates:
  - workload/deployment.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Default secret appears exactly once in envFrom when also listed in secrets
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[?(@.name=="app")].envFrom
          count: 1
      - contains:
          path: spec.template.spec.containers[?(@.name=="app")].envFrom
          content:
            secretRef:
              name: test-chart-secrets
