---
suite: "mozcloud: OTEL Collector configurations"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/otel-configurations.yaml
templates:
  - workload/deployment.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: OTEL annotations and env vars are conditional on otel and auto-instrumentation settings
    asserts:
      # OTEL settings absent if disabled
      - isNotSubset:
          path: spec.template.metadata.annotations
          content:
            instrumentation.opentelemetry.io/inject-python: "mozcloud-opentelemetry/mozcloud-opentelemetry-instrumentation"
            instrumentation.opentelemetry.io/python-container-names: app
            resource.opentelemetry.io/app_code: mozcloud-test
            resource.opentelemetry.io/component_code: web
            resource.opentelemetry.io/env_code: dev
            resource.opentelemetry.io/realm: nonprod
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-disabled
      - isNotSubset:
          path: spec.template.spec.containers[?(@.name=="app")].env
          content:
            name: HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-disabled
      # OTEL settings configured correctly when auto instrumentation is disabled
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            resource.opentelemetry.io/app_code: mozcloud-test
            resource.opentelemetry.io/component_code: web
            resource.opentelemetry.io/env_code: dev
            resource.opentelemetry.io/realm: nonprod
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-disabled
      - isNotSubset:
          path: spec.template.metadata.annotations
          content:
            instrumentation.opentelemetry.io/inject-python: "mozcloud-opentelemetry/mozcloud-opentelemetry-instrumentation"
            instrumentation.opentelemetry.io/python-container-names: app
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-disabled
      - contains:
          path: spec.template.spec.containers[?(@.name=="app")].env
          content:
            name: HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-disabled
      - notContains:
          path: spec.template.spec.containers[?(@.name=="sidecar")].env
          content:
            name: HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-disabled
      # OTEL settings configured correctly when auto instrumentation is enabled
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            instrumentation.opentelemetry.io/inject-python: "mozcloud-opentelemetry/mozcloud-opentelemetry-instrumentation"
            instrumentation.opentelemetry.io/python-container-names: app
            resource.opentelemetry.io/app_code: mozcloud-test
            resource.opentelemetry.io/component_code: web
            resource.opentelemetry.io/env_code: dev
            resource.opentelemetry.io/realm: nonprod
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-enabled
      - notContains:
          path: spec.template.spec.containers[?(@.name=="app")].env
          content:
            name: HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-enabled
      - notContains:
          path: spec.template.spec.containers[?(@.name=="sidecar")].env
          content:
            name: HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
        documentSelector:
          path: $[?(@.kind == "Deployment")].metadata.name
          value: otel-auto-instrumentation-enabled
