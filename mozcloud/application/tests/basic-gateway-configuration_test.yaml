---
suite: "mozcloud: Basic gateway configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/basic-configuration.yaml
templates:
  - gateway/backend.yaml
  - gateway/gateway.yaml
  - gateway/httproute.yaml
  - gke/backend.yaml
  - gke/gateway.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Gateway, GCPGatewayPolicy, backend Service, GCPBackendPolicy, and HealthCheckPolicy are configured correctly
    asserts:
      # GCP backend policy is configured correctly
      - isSubset:
          path: spec.default
          content:
            logging:
              enabled: true
              sampleRate: 500000
        template: gke/backend.yaml
        documentSelector:
          path: $[?(@.kind == "GCPBackendPolicy")].metadata.name
          value: test-service
      - equal:
          path: spec.targetRef.name
          value: test-service
        template: gke/backend.yaml
        documentSelector:
          path: $[?(@.kind == "GCPBackendPolicy")].metadata.name
          value: test-service
      - notExists:
          path: spec.default.securityPolicy
        template: gke/backend.yaml
        documentSelector:
          path: $[?(@.kind == "GCPBackendPolicy")].metadata.name
          value: test-service
      # External gateway is configured correctly
      - equal:
          path: metadata.annotations["networking.gke.io/certmap"]
          value: test-service-nonprod-dev
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - isNotNullOrEmpty:
          path: spec.addresses
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.listeners
          count: 1
          content:
            allowedRoutes:
              namespaces:
                from: Same
            name: http
            port: 80
            protocol: HTTP
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.listeners
          count: 1
          content:
            allowedRoutes:
              namespaces:
                from: Same
            name: https
            port: 443
            protocol: HTTPS
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - matchRegex:
          path: spec.gatewayClassName
          pattern: ^gke-l7-global-external-managed(-mc)?$
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      # Gateway policy is configured correctly
      - equal:
          path: spec.default.sslPolicy
          value: mozilla-intermediate
        template: gke/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "GCPGatewayPolicy")].metadata.name
          value: mozcloud-test
      - isSubset:
          path: spec.targetRef
          content:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
        template: gke/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "GCPGatewayPolicy")].metadata.name
          value: mozcloud-test
      # Healthcheck policy is configured correctly
      - equal:
          path: spec.default.config.httpHealthCheck.requestPath
          value: /__lbheartbeat__
        template: gke/backend.yaml
        documentSelector:
          path: $[?(@.kind == "HealthCheckPolicy")].metadata.name
          value: test-service
      - equal:
          path: spec.targetRef.name
          value: test-service
        template: gke/backend.yaml
        documentSelector:
          path: $[?(@.kind == "HealthCheckPolicy")].metadata.name
          value: test-service
      # Service is configured correctly
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - exists:
          path: spec.selector
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - isNotNullOrEmpty:
          path: spec.selector
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - equal:
          path: spec.type
          value: ClusterIP
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service

  - it: HTTPS and HTTP-to-HTTPS redirect HTTPRoutes are configured correctly
    template: gateway/httproute.yaml
    asserts:
      # HTTPS HTTPRoute is configured correctly
      - contains:
          path: spec.parentRefs
          count: 1
          content:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
            sectionName: https
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
      - notContains:
          path: spec.parentRefs
          content:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
            sectionName: http
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
      - lengthEqual:
          path: spec.rules
          count: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
      - exists:
          path: spec.rules[0].backendRefs
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
      - contains:
          path: spec.rules[0].backendRefs
          count: 1
          content:
            group: ""
            kind: Service
            name: test-service
            port: 8080
            weight: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
      - notExists:
          path: spec.rules[0].filters[0].requestRedirect
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
      # HTTP-to-HTTPS redirect HTTPRoute is configured correctly
      - contains:
          path: spec.parentRefs
          count: 1
          content:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
            sectionName: http
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service-http-redirect
      - notContains:
          path: spec.parentRefs
          content:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
            sectionName: https
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service-http-redirect
      - lengthEqual:
          path: spec.rules
          count: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service-http-redirect
      - notExists:
          path: spec.rules[0].backendRefs
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service-http-redirect
      - contains:
          path: spec.rules[0].filters
          count: 1
          content:
            requestRedirect:
              scheme: https
              statusCode: 302
            type: RequestRedirect
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service-http-redirect
      - contains:
          path: spec.rules[0].matches
          count: 1
          content:
            path:
              type: PathPrefix
              value: /
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service-http-redirect
