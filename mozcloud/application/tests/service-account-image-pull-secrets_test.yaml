---
suite: "mozcloud: Service account imagePullSecrets"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/service-account-image-pull-secrets.yaml
templates:
  - serviceaccount/serviceaccount.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Default and custom ServiceAccounts have their configured imagePullSecrets
    template: serviceaccount/serviceaccount.yaml
    asserts:
      # Default service account has imagePullSecrets
      - contains:
          path: imagePullSecrets
          content:
            name: default-registry-secret
        documentSelector:
          path: $[?(@.kind == "ServiceAccount")].metadata.name
          value: mozcloud-test
      # Custom service account has multiple imagePullSecrets
      - contains:
          path: imagePullSecrets
          content:
            name: custom-registry-secret-1
        documentSelector:
          path: $[?(@.kind == "ServiceAccount")].metadata.name
          value: custom-sa
      - contains:
          path: imagePullSecrets
          content:
            name: custom-registry-secret-2
        documentSelector:
          path: $[?(@.kind == "ServiceAccount")].metadata.name
          value: custom-sa
