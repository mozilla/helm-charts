---
suite: "mozcloud: cert-manager ingress per-host override configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/cert-manager-ingress-per-host-configuration.yaml
templates:
  - ingress/ingress.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}

  - it: Ingress renders without failures and uses per-host issuer annotation (namespace-scoped Issuer)
    template: ingress/ingress.yaml
    asserts:
      - notFailedTemplate: {}
      - equal:
          path: metadata.annotations["cert-manager.io/issuer"]
          value: letsencrypt-staging
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
      - isNull:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-service
