---
suite: "mozcloud: Init container configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/init-container-configuration.yaml
templates:
  - workload/deployment.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: Init container env vars are rendered
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - contains:
          path: spec.template.spec.initContainers[?(@.name=="init-container-1")].env
          content:
            name: INIT_KEY
            value: init-value
  - it: Init container security context is rendered
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="init-container-1")].securityContext.runAsUser
          value: 1000
