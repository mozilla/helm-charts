---
suite: "mozcloud: Multi Cluster Gateway API Configuration across two regions with weighted traffic splitting (primary region)"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/multi-cluster-gateway-configuration-across-two-regions-with-weighted-traffic-splitting-primary-region.yaml

templates:
  - gateway/backend.yaml
  - gateway/gateway.yaml
  - gateway/httproute.yaml
  - gke/backend.yaml
  - gke/gateway.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Backend Service and ServiceExport are configured for multi-cluster primary region
    template: gateway/backend.yaml
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: mozcloud-test-us-west1
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: mozcloud-test-us-west1
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/component: web
            app.kubernetes.io/name: mozcloud-test
            env_code: dev
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: mozcloud-test-us-west1
      - isAPIVersion:
          of: net.gke.io/v1
        documentSelector:
          path: $[?(@.kind == "ServiceExport")].metadata.name
          value: mozcloud-test-us-west1

  - it: HealthCheckPolicy and GCPBackendPolicy target correct ServiceImports in both regions
    template: gke/backend.yaml
    asserts:
      - equal:
          path: spec.default.config
          value:
            httpHealthCheck:
              requestPath: /readiness/
            type: HTTP
        documentSelector:
          path: $[?(@.kind == "HealthCheckPolicy")].metadata.name
          value: mozcloud-test-us-west1
      - equal:
          path: spec.targetRef
          value:
            group: net.gke.io
            kind: ServiceImport
            name: mozcloud-test-us-west1
        documentSelector:
          path: $[?(@.kind == "HealthCheckPolicy")].metadata.name
          value: mozcloud-test-us-west1
      - equal:
          path: spec.default.config
          value:
            httpHealthCheck:
              requestPath: /readiness/
            type: HTTP
        documentSelector:
          path: $[?(@.kind == "HealthCheckPolicy")].metadata.name
          value: mozcloud-test-europe-west1
      - equal:
          path: spec.targetRef
          value:
            group: net.gke.io
            kind: ServiceImport
            name: mozcloud-test-europe-west1
        documentSelector:
          path: $[?(@.kind == "HealthCheckPolicy")].metadata.name
          value: mozcloud-test-europe-west1
      - equal:
          path: spec.targetRef
          value:
            group: net.gke.io
            kind: ServiceImport
            name: mozcloud-test-us-west1
        documentSelector:
          path: $[?(@.kind == "GCPBackendPolicy")].metadata.name
          value: mozcloud-test-us-west1
      - equal:
          path: spec.targetRef
          value:
            group: net.gke.io
            kind: ServiceImport
            name: mozcloud-test-europe-west1
        documentSelector:
          path: $[?(@.kind == "GCPBackendPolicy")].metadata.name
          value: mozcloud-test-europe-west1

  - it: HTTPRoutes are configured for http-redirect and weighted traffic split
    template: gateway/httproute.yaml
    asserts:
      - lengthEqual:
          path: spec.hostnames
          count: 2
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test-http-redirect
      - contains:
          path: spec.hostnames
          count: 1
          content: dev.mozcloud-test.nonprod.webservices.mozgcp.net
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test-http-redirect
      - contains:
          path: spec.hostnames
          count: 1
          content: mozcloud-test.allizom.org
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test-http-redirect
      - lengthEqual:
          path: spec.rules
          count: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test-http-redirect
      - contains:
          path: spec.rules
          count: 1
          content:
            filters:
              - requestRedirect:
                  scheme: https
                  statusCode: 302
                type: RequestRedirect
            matches:
              - path:
                  type: PathPrefix
                  value: /
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test-http-redirect
      - lengthEqual:
          path: spec.hostnames
          count: 2
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.hostnames
          count: 1
          content: dev.mozcloud-test.nonprod.webservices.mozgcp.net
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.hostnames
          count: 1
          content: mozcloud-test.allizom.org
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test
      - lengthEqual:
          path: spec.rules
          count: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test
      - lengthEqual:
          path: spec.rules[0].backendRefs
          count: 2
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.rules[0].backendRefs
          count: 1
          content:
            group: net.gke.io
            kind: ServiceImport
            name: mozcloud-test-us-west1
            port: 8080
            weight: 100
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.rules[0].backendRefs
          count: 1
          content:
            group: net.gke.io
            kind: ServiceImport
            name: mozcloud-test-europe-west1
            port: 8080
            weight: 0
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: mozcloud-test

  - it: Gateway and GCPGatewayPolicy are configured correctly
    asserts:
      - equal:
          path: spec.targetRef
          value:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
        template: gke/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "GCPGatewayPolicy")].metadata.name
          value: mozcloud-test
      - equal:
          path: spec.gatewayClassName
          value: gke-l7-global-external-managed-mc
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - lengthEqual:
          path: spec.addresses
          count: 1
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.addresses
          count: 1
          content:
            type: NamedAddress
            value: mozcloud-test-dev-ip-v4
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - lengthEqual:
          path: spec.listeners
          count: 2
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.listeners
          count: 1
          content:
            allowedRoutes:
              namespaces:
                from: Same
            name: http
            port: 80
            protocol: HTTP
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - contains:
          path: spec.listeners
          count: 1
          content:
            allowedRoutes:
              namespaces:
                from: Same
            name: https
            port: 443
            protocol: HTTPS
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
