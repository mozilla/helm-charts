---
suite: "mozcloud: Disable managed certificate configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/disable-managed-cert-configuration.yaml
templates:
  - gateway/gateway.yaml
  - gke/frontendconfig.yaml
  - gke/ingress.yaml
  - ingress/ingress.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: No ManagedCertificate resource is created
    template: gke/ingress.yaml
    asserts:
      - notContains:
          path: $[*].kind
          content: ManagedCertificate
          any: true
  - it: Ingress annotation references the pre-existing cert name
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: metadata.annotations["networking.gke.io/managed-certificates"]
          value: existing-cert
