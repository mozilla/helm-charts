---
suite: "mozcloud: External secrets"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/external-secrets.yaml
templates:
  - externalsecret/externalsecret.yaml
  - workload/deployment.yaml
  - task/job.yaml
  - task/cronjob.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: Default external secret configured correctly
    template: externalsecret/externalsecret.yaml
    documentSelector:
      path: $[?(@.kind == "ExternalSecret")].metadata.name
      value: test-chart-secrets
    asserts:
      - equal:
          path: spec.target.name
          value: test-chart-secrets
      - equal:
          path: spec.dataFrom[0].extract.key
          value: dev-gke-app-secrets
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-11"
  - it: Custom external secret configured correctly
    template: externalsecret/externalsecret.yaml
    documentSelector:
      path: $[?(@.kind == "ExternalSecret")].metadata.name
      value: test-k8s-secret
    asserts:
      - equal:
          path: spec.target.name
          value: test-k8s-secret
      - equal:
          path: spec.dataFrom[0].extract.key
          value: dev-gke-test-custom-secrets
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "-11"
  - it: Default secret in app container
    template: workload/deployment.yaml
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="app")].envFrom[0].secretRef.name
          value: test-chart-secrets
      - lengthEqual:
          path: spec.template.spec.containers[?(@.name=="app")].envFrom
          count: 1
  - it: Default and chart-managed secrets in custom container
    template: workload/deployment.yaml
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="custom")].envFrom[0].secretRef.name
          value: test-chart-secrets
      - equal:
          path: spec.template.spec.containers[?(@.name=="custom")].envFrom[1].secretRef.name
          value: test-k8s-secret
      - lengthEqual:
          path: spec.template.spec.containers[?(@.name=="custom")].envFrom
          count: 2
  - it: Default and externally-managed secrets in external container
    template: workload/deployment.yaml
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="external")].envFrom[0].secretRef.name
          value: test-chart-secrets
      - equal:
          path: spec.template.spec.containers[?(@.name=="external")].envFrom[1].secretRef.name
          value: externally-managed-secret
      - lengthEqual:
          path: spec.template.spec.containers[?(@.name=="external")].envFrom
          count: 2
  - it: Default secret appears exactly once in envFrom when also listed in secrets
    template: workload/deployment.yaml
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="dedup")].envFrom[0].secretRef.name
          value: test-chart-secrets
      - lengthEqual:
          path: spec.template.spec.containers[?(@.name=="dedup")].envFrom
          count: 1
  - it: Init container mounts default, chart-managed, and externally-managed secrets
    template: workload/deployment.yaml
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="init")].envFrom[0].secretRef.name
          value: test-chart-secrets
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="init")].envFrom[1].secretRef.name
          value: test-k8s-secret
      - equal:
          path: spec.template.spec.initContainers[?(@.name=="init")].envFrom[2].secretRef.name
          value: externally-managed-secret
      - lengthEqual:
          path: spec.template.spec.initContainers[?(@.name=="init")].envFrom
          count: 3
  - it: Job container mounts chart-managed and externally-managed secrets
    template: task/job.yaml
    documentSelector:
      path: $[?(@.kind == "Job")].metadata.name
      value: test-job
    asserts:
      - equal:
          path: spec.template.spec.containers[?(@.name=="job")].envFrom[0].secretRef.name
          value: test-k8s-secret
      - equal:
          path: spec.template.spec.containers[?(@.name=="job")].envFrom[1].secretRef.name
          value: externally-managed-secret
      - lengthEqual:
          path: spec.template.spec.containers[?(@.name=="job")].envFrom
          count: 2
  - it: CronJob container mounts chart-managed and externally-managed secrets
    template: task/cronjob.yaml
    documentSelector:
      path: $[?(@.kind == "CronJob")].metadata.name
      value: test-cronjob
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[?(@.name=="job")].envFrom[0].secretRef.name
          value: test-k8s-secret
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[?(@.name=="job")].envFrom[1].secretRef.name
          value: externally-managed-secret
      - lengthEqual:
          path: spec.jobTemplate.spec.template.spec.containers[?(@.name=="job")].envFrom
          count: 2
