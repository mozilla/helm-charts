---
externalSecrets:
  test-k8s-secret:
    gsmSecretName: dev-gke-test-custom-secrets
    version: '12'

workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
      custom:
        secrets:
          - test-k8s-secret
        image:
          repository: test-repo/test-image
          tag: 1.0.0
      external:
        secrets:
          - externally-managed-secret
        image:
          repository: test-repo/test-image
          tag: 1.0.0
      dedup:
        secrets:
          - test-chart-secrets
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    initContainers:
      init:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
        secrets:
          - test-k8s-secret
          - externally-managed-secret

tasks:
  jobs:
    test-job:
      type: preDeployment
      containers:
        job:
          image:
            repository: test-repo/test-image
            tag: 1.0.0
          secrets:
            - test-k8s-secret
            - externally-managed-secret
  cronJobs:
    test-cronjob:
      schedule: "0 * * * *"
      jobConfig:
        containers:
          job:
            image:
              repository: test-repo/test-image
              tag: 1.0.0
            secrets:
              - test-k8s-secret
              - externally-managed-secret
