---
cloud:
  provider: on-prem
  ingress:
    default: traefik

workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      test-service:
        type: external
        api: ingress
        domains:
          - test-service.dev.test-domain.com
        addresses:
          - test-service-ip-v4
        tls:
          type: certManager
          issuer: letsencrypt-staging
          issuerKind: Issuer
          certs:
            - test-service-tls
