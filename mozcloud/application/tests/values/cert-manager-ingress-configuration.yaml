---
cloud:
  provider: on-prem
  ingress:
    default: traefik
  certManager:
    issuer: letsencrypt-prod
    issuerKind: ClusterIssuer

workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      test-service:
        type: external
        api: ingress
        domains:
          - test-service.dev.test-domain.com
        addresses:
          - test-service-ip-v4
        tls:
          type: certManager
          certs:
            - test-service-tls
