---
workloads:
  custom-port-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      custom-port-service:
        domains:
          - custom-port-service.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        servicePort: 9090
        tls:
          certs:
            - custom-port-service-nonprod-dev

  default-port-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      default-port-service:
        domains:
          - default-port-service.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        tls:
          certs:
            - default-port-service-nonprod-dev
