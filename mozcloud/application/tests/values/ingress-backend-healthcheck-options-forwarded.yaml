---
workloads:
  test-service:
    component: app
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      test-service:
        domains:
          - test-service.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
          create: true
        options:
          healthCheck:
            requestPath: /__lbheartbeat__
            port: 8000
            type: HTTP
            checkIntervalSec: 10
            timeoutSec: 5
            healthyThreshold: 1
            unhealthyThreshold: 3
