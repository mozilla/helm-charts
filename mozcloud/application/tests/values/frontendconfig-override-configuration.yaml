---
# hosts.<name>.frontendConfig overrides --- covers the
# three override settings:
#   - redirect-disabled: redirectToHttps.enabled: false
#   - custom-redirect-code: redirectToHttps.responseCodeName: TEMPORARY_REDIRECT
#   - custom-ssl-policy:   sslPolicy: mozilla-modern
workloads:
  redirect-disabled:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      redirect-disabled:
        domains:
          - redirect-disabled.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
        frontendConfig:
          redirectToHttps:
            enabled: false

  custom-redirect-code:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      custom-redirect-code:
        domains:
          - custom-redirect-code.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
        frontendConfig:
          redirectToHttps:
            responseCodeName: TEMPORARY_REDIRECT

  custom-ssl-policy:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      custom-ssl-policy:
        domains:
          - custom-ssl-policy.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
        frontendConfig:
          sslPolicy: mozilla-modern
