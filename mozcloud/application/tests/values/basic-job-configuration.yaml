---
tasks:
  jobs:
    test-predeployment-job:
      type: preDeployment
      containers:
        job:
          image:
            repository: test-repo/test-predeployment-job-image
            tag: 2.0.0
          command: ["sh", "-c"]
          args: ["echo", "running", "before", "deployment"]
    test-postdeployment-job:
      type: postDeployment
      containers:
        job:
          image:
            repository: test-repo/test-postdeployment-job-image
            tag: 3.0.0
          command: ["sh", "-c"]
          args: ["echo", "running", "after", "deployment"]
    test-presync-job:
      type: preDeployment
      argo:
        hook: PreSync
        hookDeletePolicy: HookSucceeded
        syncWave: -1
      containers:
        migrate:
          image:
            repository: test-repo/db-migrate
            tag: "1.0.0"
          command: ["sh", "-c"]
          args: ["echo", "migrating"]
