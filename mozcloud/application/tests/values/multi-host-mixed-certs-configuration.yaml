---
workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      host-custom:
        domains:
          - custom.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
          create: true
          certs:
            - my-legacy-cert
            - mcrt-custom-dev-test-domain-com
      host-default:
        domains:
          - default.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
          create: true
