---
workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      host-alpha:
        domains:
          - alpha.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
          create: true
          certs:
            - cert-alpha-1
            - cert-alpha-2
      host-beta:
        domains:
          - beta.dev.test-domain.com
        addresses:
          - mozcloud-dev-ip-v4
        api: ingress
        tls:
          type: ManagedCertificate
          create: true
          certs:
            - cert-beta
