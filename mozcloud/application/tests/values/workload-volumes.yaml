persistentVolumes:
  pvc-rwo:
    accessModes: 
      - ReadWriteOnce
    size: 10Gi
    storageClassName: standard
  pvc-rwm:
    accessModes: 
      - ReadWriteOnce
      - ReadWriteMany
    size: 50Gi
    storageClassName: mozilla-enterprise-rwx
tasks:
  cronJobs:
    test-cronjob:
      schedule: '@hourly'
      jobConfig:
        gcsFuseSidecar:
          cpuLimit: 500m
          memoryLimit: 512Mi
        containers:
          job:
            image:
              repository: test-repo/test-cronjob-image
              tag: "1.0.0"
            command: ["sh", "-c"]
            args: ["echo", "tick"]
            volumes:
              - name: gcs-bucket
                type: gcsFuseCsi
                path: /data/bucket
                bucketName: my-test-bucket
  jobs:
    test-job:
      type: postDeployment
      gcsFuseSidecar:
        cpuLimit: "1"
        memoryLimit: 1Gi
      containers:
        job:
          image:
            repository: test-repo/test-job-image
            tag: "1.0.0"
          command: ["sh", "-c"]
          args: ["echo", "hi"]
          volumes:
            - name: gcs-bucket
              type: gcsFuseCsi
              path: /data/bucket
              bucketName: my-test-bucket
              loggingSeverity: warning
workloads:
  test-service:
    component: web
    gcsFuseSidecar:
      cpuLimit: 250m
      memoryLimit: 256Mi
      cpuRequest: 100m
      memoryRequest: 128Mi
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
        volumes:
          - name: pvc-rwo
            path: /data/pvc-rwo
            type: persistentVolume
          - name: pvc-rwm
            path: /data/pvc-rwm
            type: persistentVolume
          - name: gcs-bucket
            type: gcsFuseCsi
            path: /data/bucket
            bucketName: my-test-bucket
            mountOptions: implicit-dirs,uid=1001
            readOnly: true
            skipCSIBucketAccessCheck: true
            loggingSeverity: warning
  test-service-no-gcs:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
        volumes:
          - name: pvc-rwo
            path: /data/pvc-rwo
            type: persistentVolume
