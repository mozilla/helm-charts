---
workloads:
  test-service:
    component: db
    type: statefulset
    strategy: RollingUpdate
    statefulSet:
      podManagementPolicy: Parallel
      volumeClaimTemplates:
        data:
          accessMode: ReadWriteOnce
          storageClassName: standard-rwo
          storage: 10Gi
    containers:
      app:
        image:
          repository: test-repo/test-db
          tag: "1.0.0"
