---
global:
  mozcloud:
    image:
      registry: us-west1-docker.pkg.dev/moz-fx-platform-artifacts

workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: platform-images/myapp
          tag: "1.0.0"
      sidecar:
        image:
          repository: us-west1-docker.pkg.dev/moz-fx-platform-artifacts/other-images/sidecar
          tag: "2.0.0"
  test-service-2:
    component: api
    containers:
      app:
        image:
          repository: us-west1-docker.pkg.dev/moz-fx-fx-testing/fx-testing-prod/api-image
          tag: "1.0.1"
  test-service-nginx:
    component: web
    nginx:
      enabled: true
      configMap: nginx-config
    containers:
      app:
        image:
          repository: platform-images/webapp
          tag: "1.0.0"
    hosts:
      test-service-nginx:
        domains:
          - test-nginx.dev.example.com
        addresses:
          - test-ip
        tls:
          certs:
            - test-cert

configMaps:
  nginx-config:
    data:
      nginx.conf: |
        events { worker_connections 1024; }
        http { server { listen 8080; location / { proxy_pass http://localhost:8000; } } }
