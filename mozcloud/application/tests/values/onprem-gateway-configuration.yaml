cloud:
  provider: on-prem

workloads:
  test-service:
    component: web
    containers:
      app:
        image:
          repository: test-repo/test-image
          tag: 1.0.0
    hosts:
      test-service:
        type: external
        domains:
          - test-service.dev.test-domain.com
        api: gateway
        gatewayClass: nginx
        tls:
          type: secret
          certs:
            - test-service-tls
