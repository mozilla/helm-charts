---
suite: "mozcloud: On-prem gateway configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/onprem-gateway-configuration.yaml
templates:
  - gateway/backend.yaml
  - gateway/gateway.yaml
  - gateway/httproute.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: GKE-specific CRDs and annotations are not emitted
    asserts:
      # GKE CRDs must not be emitted
      - notContains:
          path: $[*].kind
          content: GCPBackendPolicy
        documentIndex: 0
        template: gateway/backend.yaml
      - notContains:
          path: $[*].kind
          content: HealthCheckPolicy
        documentIndex: 0
        template: gateway/backend.yaml
      - hasDocuments:
          count: 1
        template: gateway/gateway.yaml
      - hasDocuments:
          count: 1
        template: gateway/backend.yaml
      - equal:
          path: kind
          value: Service
        documentIndex: 0
        template: gateway/backend.yaml
      - isNull:
          path: metadata.annotations["cloud.google.com/neg"]
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service
      - isNull:
          path: metadata.annotations["cloud.google.com/backend-config"]
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-service

  - it: Gateway uses user-specified gatewayClass and Kubernetes secret TLS (no GKE specifics)
    template: gateway/gateway.yaml
    documentSelector:
      path: $[?(@.kind == "Gateway")].metadata.name
      value: mozcloud-test
    asserts:
      # Gateway resource assertions
      - equal:
          path: spec.gatewayClassName
          value: nginx
      - isNull:
          path: spec.addresses
      - isNull:
          path: metadata.annotations["networking.gke.io/certmap"]
      - contains:
          path: spec.listeners
          content:
            allowedRoutes:
              namespaces:
                from: Same
            name: https
            port: 443
            protocol: HTTPS
            tls:
              mode: Terminate
              certificateRefs:
                - name: test-service-tls

  - it: HTTPRoutes render and reference the Gateway correctly
    template: gateway/httproute.yaml
    asserts:
      # HTTPRoutes should still render normally
      - hasDocuments:
          count: 2
      - contains:
          path: spec.parentRefs
          count: 1
          content:
            group: gateway.networking.k8s.io
            kind: Gateway
            name: mozcloud-test
            sectionName: https
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: test-service
