---
suite: "mozcloud: Ingress backend options configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/ingress-backend-options-configuration.yaml
templates:
  - gateway/gateway.yaml
  - ingress/frontendconfig.yaml
  - ingress/ingress.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: timeoutSec is rendered at the BackendConfig spec root level
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "BackendConfig")].metadata.name
      value: test-service
    asserts:
      - equal:
          path: spec.timeoutSec
          value: 600
  - it: timeoutSec is not nested under logging
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "BackendConfig")].metadata.name
      value: test-service
    asserts:
      - notExists:
          path: spec.logging.timeoutSec
  - it: logSampleRate is rendered as a ratio in BackendConfig logging spec
    template: ingress/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "BackendConfig")].metadata.name
      value: test-service
    asserts:
      - isSubset:
          path: spec
          content:
            logging:
              enable: true
              sampleRate: 0.1
