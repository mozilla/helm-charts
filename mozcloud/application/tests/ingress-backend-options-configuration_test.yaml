---
suite: "mozcloud: Ingress backend options configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/ingress-backend-options-configuration.yaml
templates:
  - gateway/gateway.yaml
  - gke/frontendconfig.yaml
  - gke/ingress.yaml
  - ingress/ingress.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: BackendConfig spec renders timeoutSec, logSampleRate, and securityPolicy correctly
    template: gke/ingress.yaml
    documentSelector:
      path: $[?(@.kind == "BackendConfig")].metadata.name
      value: test-service
    asserts:
      # timeoutSec is rendered at the BackendConfig spec root level
      - equal:
          path: spec.timeoutSec
          value: 600
      # timeoutSec is not nested under logging
      - notExists:
          path: spec.logging.timeoutSec
      # logSampleRate is rendered as a ratio in BackendConfig logging spec
      - isSubset:
          path: spec
          content:
            logging:
              enable: true
              sampleRate: 0.1
      # securityPolicy is rendered as an object in BackendConfig spec
      - equal:
          path: spec.securityPolicy
          value:
            name: my-app-cloud-armor-policy
