---
suite: "mozcloud: Top-level PodMonitorings"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/podmonitorings.yaml
templates:
  - gke/podmonitoring.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: PodMonitoring is rendered with app_code-key name format
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: mozcloud-test-telegraf
        documentIndex: 0
      - equal:
          path: kind
          value: PodMonitoring
        documentIndex: 0

  - it: PodMonitoring uses provided matchLabels as selector
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: telegraf
        documentIndex: 0

  - it: PodMonitoring applies default path and interval to endpoints
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: 8080
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
        documentIndex: 0

  - it: telegraf.enabled with podMonitorings set fails with a helpful error
    set:
      telegraf.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "Remove telegraf.enabled and configure podMonitorings.telegraf instead"
