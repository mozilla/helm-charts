---
suite: "mozcloud: Mixed gateway and ingress configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/mixed-gateway-ingress-configuration.yaml
templates:
  - gateway/backend.yaml
  - gateway/gateway.yaml
  - gateway/httproute.yaml
  - gke/backend.yaml
  - gke/frontendconfig.yaml
  - gke/gateway.yaml
  - gke/ingress.yaml
  - ingress/ingress.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Gateway resources are only created for the gateway workload
    asserts:
      # Gateway template tests - should only create resources for gateway-service
      - hasDocuments:
          count: 1
        template: gateway/gateway.yaml
      - isNotNullOrEmpty:
          path: spec.addresses
        template: gateway/gateway.yaml
        documentSelector:
          path: $[?(@.kind == "Gateway")].metadata.name
          value: mozcloud-test
      - equal:
          path: spec.type
          value: ClusterIP
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: gateway-service
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        template: gateway/backend.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: gateway-service
      - contains:
          path: spec.rules[0].backendRefs
          content:
            group: ""
            kind: Service
            name: gateway-service
            port: 8080
            weight: 1
        template: gateway/httproute.yaml
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: gateway-service

  - it: Ingress resources are only created for the ingress workload
    asserts:
      # Ingress template tests - should only create resources for ingress-service
      - hasDocuments:
          count: 1
        template: gke/frontendconfig.yaml
      - hasDocuments:
          count: 2
        template: ingress/ingress.yaml
      - isSubset:
          path: spec
          content:
            defaultBackend:
              service:
                name: ingress-service
                port:
                  number: 8080
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: ingress-service
      - equal:
          path: spec.type
          value: ClusterIP
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: ingress-service
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        template: ingress/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: ingress-service
      - contains:
          path: spec.domains
          content: "ingress-service.dev.test-domain.com"
        template: gke/ingress.yaml
        documentSelector:
          path: $[?(@.kind == "ManagedCertificate")].metadata.name
          value: mcrt-ingress-service-dev-test-domain-com

  - it: No resource leakage between gateway and ingress templates
    asserts:
      # Cross-validation tests - ensure no resource leakage between templates
      - notContains:
          path: $[*].metadata.name
          content: ingress-service
          any: true
        template: gateway/backend.yaml
      - notContains:
          path: $[*].metadata.name
          content: gateway-service
          any: true
        template: ingress/ingress.yaml
