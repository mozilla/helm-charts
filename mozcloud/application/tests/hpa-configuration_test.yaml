---
suite: "mozcloud: HPA configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/hpa-configuration.yaml
templates:
  - workload/hpa.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: HPA has sync-wave annotation and targets the correct Deployment
    documentSelector:
      path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
      value: test-service
    asserts:
      # HPA has sync-wave annotation set to 1
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "1"
      # HPA targets the correct deployment
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment
      - equal:
          path: spec.scaleTargetRef.name
          value: test-service
