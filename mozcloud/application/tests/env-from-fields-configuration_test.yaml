---
suite: "mozcloud: envFromFields configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/env-from-fields-configuration.yaml
templates:
  - workload/deployment.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}

  - it: Deployment renders without failures and contains envFromFields as fieldRef env vars
    template: workload/deployment.yaml
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      - notFailedTemplate: {}
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
