---
suite: "mozcloud: HTTPRoute rules"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/httproute-rules.yaml
templates:
  - gateway/httproute.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Header-only, path-only, and headers-and-path HTTPRoutes render correct rules
    asserts:
      # Header-only HTTPRoute is configured with correct rules
      - contains:
          path: spec.rules[0].backendRefs
          content:
            group: ""
            kind: Service
            name: test-service
            port: 8080
            weight: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: header-only
      - contains:
          path: spec.rules[0].matches
          content:
            headers:
              - name: foo
                value: bar
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: header-only
      # Path-only HTTPRoute is configured with correct rules
      - contains:
          path: spec.rules[0].backendRefs
          content:
            group: ""
            kind: Service
            name: test-service
            port: 8080
            weight: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: path-only
      - contains:
          path: spec.rules[0].matches
          content:
            path:
              type: PathPrefix
              value: /foo
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: path-only
      # Headers and path HTTPRoute is configured with correct rules
      - contains:
          path: spec.rules[0].backendRefs
          content:
            group: ""
            kind: Service
            name: test-service
            port: 8080
            weight: 1
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: headers-and-path
      - contains:
          path: spec.rules[0].matches
          content:
            headers:
              - name: foo
                value: bar
              - name: baz
                value: qux
            path:
              type: PathPrefix
              value: /foo
        documentSelector:
          path: $[?(@.kind == "HTTPRoute")].metadata.name
          value: headers-and-path
