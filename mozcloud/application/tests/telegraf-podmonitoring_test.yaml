---
suite: "mozcloud: Telegraf PodMonitoring"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/telegraf-podmonitoring.yaml
templates:
  - gke/podmonitoring.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: PodMonitoring is rendered with correct name, kind, telegraf selector, and default endpoint when enabled
    asserts:
      # PodMonitoring is rendered when telegraf.enabled is true
      - hasDocuments:
          count: 1
      # PodMonitoring resource has correct name
      - equal:
          path: metadata.name
          value: mozcloud-test-telegraf
        documentIndex: 0
      # PodMonitoring resource has correct kind
      - equal:
          path: kind
          value: PodMonitoring
        documentIndex: 0
      # PodMonitoring scrapes telegraf selector
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: telegraf
        documentIndex: 0
      # Endpoint uses the documented defaults when not overridden
      - equal:
          path: spec.endpoints[0].port
          value: 8080
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].interval
          value: 30s
        documentIndex: 0

  - it: PodMonitoring is not rendered when telegraf.enabled is false
    set:
      telegraf.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: PodMonitoring honors custom port (named string), path, and interval
    set:
      telegraf.port: prometheus
      telegraf.path: /__metrics__
      telegraf.interval: 60s
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: prometheus
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].path
          value: /__metrics__
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].interval
          value: 60s
        documentIndex: 0
