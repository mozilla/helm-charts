---
suite: "mozcloud: PodDisruptionBudget configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/pdb-configuration.yaml
templates:
  - workload/pdb.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Single PDB is rendered with correct kind, name, budgets, selector, and no PDB for disabled workloads
    asserts:
      # Only one PDB is rendered across all three workloads
      - hasDocuments:
          count: 1
      # PDB is created with correct kind and name
      - equal:
          path: apiVersion
          value: policy/v1
        documentSelector:
          path: $[?(@.kind == "PodDisruptionBudget")].metadata.name
          value: test-service
      - equal:
          path: kind
          value: PodDisruptionBudget
        documentSelector:
          path: $[?(@.kind == "PodDisruptionBudget")].metadata.name
          value: test-service
      # PDB sets minAvailable and maxUnavailable correctly
      - equal:
          path: spec.minAvailable
          value: 1
        documentSelector:
          path: $[?(@.kind == "PodDisruptionBudget")].metadata.name
          value: test-service
      - equal:
          path: spec.maxUnavailable
          value: 30%
        documentSelector:
          path: $[?(@.kind == "PodDisruptionBudget")].metadata.name
          value: test-service
      # PDB selector matches workload labels
      - isNotNullOrEmpty:
          path: spec.selector.matchLabels
        documentSelector:
          path: $[?(@.kind == "PodDisruptionBudget")].metadata.name
          value: test-service
      # No PDB is rendered for workload with empty-pdb or disabled-pdb
      - notContains:
          path: "[*].metadata.name"
          content: test-service-empty-pdb
      - notContains:
          path: "[*].metadata.name"
          content: test-service-disabled-pdb
