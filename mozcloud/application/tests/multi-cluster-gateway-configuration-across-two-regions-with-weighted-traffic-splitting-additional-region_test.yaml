---
suite: "mozcloud: Multi Cluster Gateway API Configuration across two regions with weighted traffic splitting (additional region)"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/multi-cluster-gateway-configuration-across-two-regions-with-weighted-traffic-splitting-primary-region.yaml
  - values/multi-cluster-gateway-configuration-across-two-regions-with-weighted-traffic-splitting-additional-region.yaml
templates:
  - gateway/backend.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Additional region renders Service and ServiceExport correctly
    asserts:
      # Resource count matches expectations
      - hasDocuments:
          count: 2
      # Service is configured correctly
      - lengthEqual:
          path: spec.ports
          count: 1
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: mozcloud-test-europe-west1
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: mozcloud-test-europe-west1
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/component: web
            app.kubernetes.io/name: mozcloud-test
            env_code: dev
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: mozcloud-test-europe-west1
      # ServiceExport exists
      - isAPIVersion:
          of: net.gke.io/v1
        documentSelector:
          path: $[?(@.kind == "ServiceExport")].metadata.name
          value: mozcloud-test-europe-west1
