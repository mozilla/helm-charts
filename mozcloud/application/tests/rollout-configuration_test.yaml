---
suite: "mozcloud: Rollout configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/rollout-configuration.yaml
templates:
  - workload/rollout.yaml
  - workload/hpa.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Renders a Rollout with canary strategy and HPA targeting the Rollout
    asserts:
      # Renders a Rollout instead of a Deployment
      - equal:
          path: apiVersion
          value: argoproj.io/v1alpha1
        template: workload/rollout.yaml
        documentSelector:
          path: $[?(@.kind == "Rollout")].metadata.name
          value: test-service
      - equal:
          path: kind
          value: Rollout
        template: workload/rollout.yaml
        documentSelector:
          path: $[?(@.kind == "Rollout")].metadata.name
          value: test-service
      # Rollout has canary strategy with correct steps
      - isNotEmpty:
          path: spec.strategy.canary.steps
        template: workload/rollout.yaml
        documentSelector:
          path: $[?(@.kind == "Rollout")].metadata.name
          value: test-service
      - contains:
          path: spec.strategy.canary.steps
          content:
            setWeight: 20
        template: workload/rollout.yaml
        documentSelector:
          path: $[?(@.kind == "Rollout")].metadata.name
          value: test-service
      - contains:
          path: spec.strategy.canary.steps
          content:
            pause:
              duration: 30s
        template: workload/rollout.yaml
        documentSelector:
          path: $[?(@.kind == "Rollout")].metadata.name
          value: test-service
      # Rollout does not have a Deployment-style strategy type
      - notExists:
          path: spec.strategy.type
        template: workload/rollout.yaml
        documentSelector:
          path: $[?(@.kind == "Rollout")].metadata.name
          value: test-service
      # HPA targets the Rollout instead of a Deployment
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: argoproj.io/v1alpha1
        template: workload/hpa.yaml
        documentSelector:
          path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
          value: test-service
      - equal:
          path: spec.scaleTargetRef.kind
          value: Rollout
        template: workload/hpa.yaml
        documentSelector:
          path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
          value: test-service
      - equal:
          path: spec.scaleTargetRef.name
          value: test-service
        template: workload/hpa.yaml
        documentSelector:
          path: $[?(@.kind == "HorizontalPodAutoscaler")].metadata.name
          value: test-service

  - it: Schema rejects canary as a plain string strategy
    template: workload/rollout.yaml
    set:
      workloads.test-service.strategy: canary
    asserts:
      - failedTemplate:
          errorPattern: "value must be one of 'Recreate', 'RollingUpdate'"
  - it: Schema rejects canary strategy with empty steps
    template: workload/rollout.yaml
    values:
      - values/globals.yaml
      - values/rollout-empty-steps.yaml
    asserts:
      - failedTemplate:
          errorPattern: "minItems: got 0, want 1"
  - it: Schema rejects unsupported strategy type
    template: workload/rollout.yaml
    values:
      - values/globals.yaml
      - values/rollout-configuration.yaml
    set:
      workloads.test-service.strategy.blueGreen.steps[0].setWeight: 20
    asserts:
      - failedTemplate:
          errorPattern: "additional properties 'blueGreen' not allowed"
