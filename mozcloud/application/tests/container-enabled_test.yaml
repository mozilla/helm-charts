---
suite: "mozcloud: Container enabled toggle"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/container-enabled.yaml
templates:
  - workload/deployment.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: Only enabled containers and init containers are rendered
    documentSelector:
      path: $[?(@.kind == "Deployment")].metadata.name
      value: test-service
    asserts:
      # Only enabled containers are rendered
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: app
      # Only enabled init containers are rendered
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-enabled
      # Disabled containers are excluded from output
      - notContains:
          path: spec.template.spec.containers
          content:
            name: disabled-container
          any: true
      # Disabled init containers are excluded from output
      - notContains:
          path: spec.template.spec.initContainers
          content:
            name: init-disabled
          any: true
