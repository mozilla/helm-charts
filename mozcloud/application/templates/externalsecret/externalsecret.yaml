{{- $chartMetadata := dict "Chart" .Chart "Release" .Release }}
{{- $context := deepCopy . }}
{{- $_ := set $context "component_code" "externalsecret" }}
{{- $externalSecrets := default dict .Values.externalSecrets }}
{{- $globals := .Values.global.mozcloud }}
{{- $labelParams := mergeOverwrite $chartMetadata (include "mozcloud.labelParams" . | fromYaml) }}
{{- $prefix := include "mozcloud.preview.prefix" . }}
{{- $params := dict "context" (mergeOverwrite (deepCopy $context) $labelParams) }}
{{- $labels := include "mozcloud.labels" $params | fromYaml }}
{{- $defaultEnabled := dig "default" "enabled" true $externalSecrets }}
{{- /*
  We always define a default tenant secret that maps to <env>-gke-app-secrets in GSM
  If that is not present in the user defined dictionary of external secrets we create a
  lightweight config dictionary and insert it into the $externalSecrets dict.
*/ -}}
{{- $defaultSecretName := printf "%s-secrets" $globals.chart }}
{{- if and $defaultEnabled (not (hasKey $externalSecrets $defaultSecretName)) }}
  {{- $defaultSecretConfig := dict "gsmSecretName" (printf "%s-gke-app-secrets" $globals.env_code) }}
  {{- $_ := set $externalSecrets $defaultSecretName $defaultSecretConfig }}
{{- end }}
{{- range $name, $config := $externalSecrets }}
{{- if eq $name "default" }}{{- continue }}{{- end }}
{{- $name = printf "%s%s" $prefix $name }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $name }}
  labels:
    {{- $labels.labels | toYaml | nindent 4 }}
  {{- $params := dict "type" "externalSecret" }}
  {{- $annotations := include "mozcloud.annotations.argo" $params | fromYaml }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ default "5m" $config.refreshInterval }}
  secretStoreRef:
    kind: SecretStore
    name: secret-store
  target:
    name: {{ $name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: {{ $config.gsmSecretName }}
        metadataPolicy: None
        version: {{ default "latest" $config.version | quote }}
{{- end }}
