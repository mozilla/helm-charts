{{- define "pod.container.resources" -}}
{{- $requests := .requests -}}
{{- $limits := default (dict) .limits -}}
{{- $resources := dict "requests" .requests "limits" $limits -}}
{{- /* Validate CPU requests and limits */ -}}
{{- $requestSuffix := "" -}}
{{- $request := $requests.cpu | toString -}}
{{- /*
CPU resources can only be integers/floats for an entire CPU or millicpu (m)
*/ -}}
{{- if hasSuffix "m" $request -}}
  {{- $requestSuffix = "m" }}
  {{- $request = trimSuffix "m" $request -}}
{{- end -}}
{{- if and (not $requestSuffix) (or (regexFind "[a-zA-Z]$" $request) (le (float64 $request) 0.0)) -}}
  {{- fail (printf "CPU requests must be positive and use one of the following formats: int, float, or millicpu notation (eg. 100m)") -}}
{{- end -}}
{{- if $limits.cpu -}}
  {{- $limitSuffix := "" -}}
  {{- $limit := $limits.cpu | toString -}}
  {{- /*
  CPU resources can only be integers/floats for an entire CPU or millicpu (m)
  */ -}}
  {{- if hasSuffix "m" $limit -}}
    {{- $limitSuffix = "m" }}
    {{- $limit = trimSuffix "m" $limit -}}
  {{- end -}}
  {{- if and (not $limitSuffix) (or (regexFind "[a-zA-Z]$" $limit) (le (float64 $limit) 0.0)) -}}
    {{- fail (printf "CPU limits must be positive and use one of the following formats: int, float, or millicpu notation (eg. 100m)") -}}
  {{- end -}}
  {{- if or $limitSuffix (eq (float64 $limit) (floor (float64 $limit))) -}}
    {{- /*
    Using "ceil" function here to round up any limits using millicpu
    notations with decimals. For example, "1.5m" becomes "2m".
    */ -}}
    {{- $limit = ceil (float64 $limit) -}}
    {{- $_ := set $resources.limits "cpu" (printf "%d%s" (int $limit) $limitSuffix) -}}
  {{- end -}}
{{- end -}}
{{- /* Configure CPU limits, if not set */}}
{{- if not $limits.cpu -}}
  {{- $limit := "" -}}
  {{- /* Keep ints as ints to create cleaner output */ -}}
  {{- if or $requestSuffix (eq (float64 $request) (floor (float64 $request))) -}}
    {{- /*
    Using "ceil" function here to round up any requests using millicpu
    notations with decimals. For example, "1.5m" becomes "2m".
    */ -}}
    {{- $request = ceil (float64 $request) -}}
    {{- $_ := set $resources.requests "cpu" (printf "%d%s" (int $request) $requestSuffix) -}}
    {{- $limit = printf "%d%s" (mul 2 (int $request)) $requestSuffix -}}
  {{- else -}}
    {{- $limit = printf "%.3f" (mulf 2 (float64 $request)) -}}
  {{- end -}}
  {{- $_ := set $resources.limits "cpu" $limit -}}
{{- end -}}
{{- /* Validate memory requests and limits */ -}}
{{- $requestSuffix = "" -}}
{{- /* Only allow the following unit types: K, Ki, M, Mi, G, Gi */ -}}
{{- $memorySuffixes := list "K" "Ki" "M" "Mi" "G" "Gi" -}}
{{- $request = $requests.memory | toString -}}
{{- range $memorySuffix := $memorySuffixes -}}
  {{- if hasSuffix $memorySuffix $request -}}
    {{- $requestSuffix = $memorySuffix }}
    {{- $request = trimSuffix $requestSuffix $request -}}
  {{- end -}}
{{- end -}}
{{- if or (not $requestSuffix) (le (float64 $request) 0.0) -}}
  {{- fail (printf "Memory requests must be positive and use one of the following unit types: %s" (join ", " $memorySuffixes)) -}}
{{- end -}}
{{- if $limits.memory -}}
  {{- $limitSuffix := "" -}}
  {{- $limit := $limits.memory | toString -}}
  {{- range $memorySuffix := $memorySuffixes -}}
    {{- if hasSuffix $memorySuffix $limit -}}
      {{- $limitSuffix = $memorySuffix }}
      {{- $limit = trimSuffix $limitSuffix $limit -}}
    {{- end -}}
  {{- end -}}
  {{- if or (not $limitSuffix) (le (float64 $limit) 0.0) -}}
    {{- fail (printf "Memory limits must be positive and use one of the following unit types: %s" (join ", " $memorySuffixes)) -}}
  {{- end -}}
{{- end -}}
{{- /* Configure memory limits, if not set */ -}}
{{- if not $limits.memory -}}
  {{- $limit := "" -}}
  {{- /* Keep ints as ints to create cleaner output */ -}}
  {{- if eq (float64 $request) (floor (float64 $request)) -}}
    {{- $limit = printf "%d%s" (mul 2 (int $request)) $requestSuffix -}}
  {{- else -}}
    {{- $limit = printf "%.3f%s" (mulf 2 (float64 $request)) $requestSuffix -}}
  {{- end -}}
  {{- $_ := set $resources.limits "memory" $limit -}}
{{- end -}}
{{- /* Return resources */ -}}
{{- $resources | toYaml }}
{{- end -}}

{{- define "pod.container.securityContext" -}}
allowPrivilegeEscalation: false
capabilities:
  {{- if gt (len (default (list) .addCapabilities)) 0 }}
  add:
    {{- range $capability := .addCapabilities }}
    - {{ $capability }}
    {{- end }}
  {{- end }}
  drop:
    - ALL
{{- $user := default "" .user }}
{{- $group := default "" .group }}
{{- if and $user (not $group) }}
  {{- $group = $user }}
{{- else if and $group (not $user) }}
  {{- $user = $group }}
{{- end -}}
{{- if $user }}
runAsUser: {{ .user }}
{{- end }}
{{- if $group }}
runAsGroup: {{ .group }}
{{- end }}
seccompProfile:
  type: "RuntimeDefault"
{{- end -}}

{{- define "pod.securityContext" -}}
# PSS https://kubernetes.io/docs/concepts/security/pod-security-standards/
# restricted profile
seccompProfile:
  type: "RuntimeDefault"
runAsNonRoot: {{ dig "runAsNonRoot" true . }}
runAsUser: {{ default 10001 .user }}
runAsGroup: {{ default 10001 .group }}
{{- end -}}
