{{- /*
Validates CPU, memory, and optional ephemeral-storage resource requests and
calculates resource limits. CPU and memory limits default to 2× the request
value when not explicitly provided. Ephemeral-storage limits default to the
request value (no doubling).

CPU validation: accepts integer, float (whole CPUs), or millicpu notation
(e.g. "250m"). Decimal millicpu values are rounded up using ceil to produce a
valid integer millicpu string (e.g. "1.5m" → "2m").

Memory and ephemeral-storage validation: requires a positive number with one
of the following unit suffixes: K, Ki, M, Mi, G, Gi.

Params:
  requests (dict): (required) Resource requests. Must include:
    cpu (string):              (required) CPU request (e.g. "250m", "1", "0.5").
    memory (string):           (required) Memory request (e.g. "256Mi", "1Gi").
    ephemeral-storage (string): (optional) Ephemeral storage request (e.g. "1Gi").
  limits (dict):   (optional) Resource limits. If omitted or partially unset,
                   missing values are auto-calculated as 2× the
                   corresponding request value (except ephemeral-storage
                   which defaults to 1×).
    cpu (string):              (optional) CPU limit. Auto-calculated if absent.
    memory (string):           (optional) Memory limit. Auto-calculated if absent.
    ephemeral-storage (string): (optional) Ephemeral storage limit. Defaults to request.

Returns:
  (string) YAML-encoded Kubernetes resources object with "requests" and
           "limits" sub-keys.

Example:
  Input:
    requests:
      cpu: 250m
      memory: 256Mi
    # limits not provided

  Output:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"     # 2× request
      memory: "512Mi" # 2× request
*/ -}}
{{- define "pod.container.resources" -}}
{{- $requests := .requests -}}
{{- $limits := default dict .limits -}}
{{- $resources := dict "requests" .requests "limits" $limits -}}
{{- /* Validate CPU requests and limits */ -}}
{{- $requestSuffix := "" -}}
{{- $request := $requests.cpu | toString -}}
{{- /*
CPU resources can only be integers/floats for an entire CPU or millicpu (m)
*/ -}}
{{- if hasSuffix "m" $request -}}
  {{- $requestSuffix = "m" }}
  {{- $request = trimSuffix "m" $request -}}
{{- end -}}
{{- if and (not $requestSuffix) (or (regexFind "[a-zA-Z]$" $request) (le (float64 $request) 0.0)) -}}
  {{- fail (printf "CPU requests must be positive and use one of the following formats: int, float, or millicpu notation (eg. 100m)") -}}
{{- end -}}
{{- if $limits.cpu -}}
  {{- $limitSuffix := "" -}}
  {{- $limit := $limits.cpu | toString -}}
  {{- /*
  CPU resources can only be integers/floats for an entire CPU or millicpu (m)
  */ -}}
  {{- if hasSuffix "m" $limit -}}
    {{- $limitSuffix = "m" }}
    {{- $limit = trimSuffix "m" $limit -}}
  {{- end -}}
  {{- if and (not $limitSuffix) (or (regexFind "[a-zA-Z]$" $limit) (le (float64 $limit) 0.0)) -}}
    {{- fail (printf "CPU limits must be positive and use one of the following formats: int, float, or millicpu notation (eg. 100m)") -}}
  {{- end -}}
  {{- if or $limitSuffix (eq (float64 $limit) (floor (float64 $limit))) -}}
    {{- /*
    Using "ceil" function here to round up any limits using millicpu
    notations with decimals. For example, "1.5m" becomes "2m".
    */ -}}
    {{- $limit = ceil (float64 $limit) -}}
    {{- $_ := set $resources.limits "cpu" (printf "%d%s" (int $limit) $limitSuffix) -}}
  {{- end -}}
{{- end -}}
{{- /* Configure CPU limits, if not set */}}
{{- if not $limits.cpu -}}
  {{- $limit := "" -}}
  {{- /* Keep ints as ints to create cleaner output */ -}}
  {{- if or $requestSuffix (eq (float64 $request) (floor (float64 $request))) -}}
    {{- /*
    Using "ceil" function here to round up any requests using millicpu
    notations with decimals. For example, "1.5m" becomes "2m".
    */ -}}
    {{- $request = ceil (float64 $request) -}}
    {{- $_ := set $resources.requests "cpu" (printf "%d%s" (int $request) $requestSuffix) -}}
    {{- $limit = printf "%d%s" (mul 2 (int $request)) $requestSuffix -}}
  {{- else -}}
    {{- $limit = printf "%.3f" (mulf 2 (float64 $request)) -}}
  {{- end -}}
  {{- $_ := set $resources.limits "cpu" $limit -}}
{{- end -}}
{{- /* Validate memory requests and limits */ -}}
{{- $unitPattern := "(K|Ki|M|Mi|G|Gi)$" -}}
{{- $request = $requests.memory | toString -}}
{{- $requestSuffix = regexFind $unitPattern $request -}}
{{- $request = trimSuffix $requestSuffix $request -}}
{{- if or (not $requestSuffix) (le (float64 $request) 0.0) -}}
  {{- fail "Memory requests must be positive and use one of the following unit types: K, Ki, M, Mi, G, Gi" -}}
{{- end -}}
{{- if $limits.memory -}}
  {{- $limit := $limits.memory | toString -}}
  {{- $limitSuffix := regexFind $unitPattern $limit -}}
  {{- $limit = trimSuffix $limitSuffix $limit -}}
  {{- if or (not $limitSuffix) (le (float64 $limit) 0.0) -}}
    {{- fail "Memory limits must be positive and use one of the following unit types: K, Ki, M, Mi, G, Gi" -}}
  {{- end -}}
{{- end -}}
{{- /* Configure memory limits, if not set */ -}}
{{- if not $limits.memory -}}
  {{- $limit := "" -}}
  {{- /* Keep ints as ints to create cleaner output */ -}}
  {{- if eq (float64 $request) (floor (float64 $request)) -}}
    {{- $limit = printf "%d%s" (mul 2 (int $request)) $requestSuffix -}}
  {{- else -}}
    {{- $limit = printf "%.3f%s" (mulf 2 (float64 $request)) $requestSuffix -}}
  {{- end -}}
  {{- $_ := set $resources.limits "memory" $limit -}}
{{- end -}}
{{- /* Validate and configure ephemeral-storage requests and limits */ -}}
{{- if not (index $requests "ephemeral-storage") -}}
  {{- $_ := unset $resources.requests "ephemeral-storage" -}}
{{- end -}}
{{- if index $requests "ephemeral-storage" -}}
  {{- $esRequest := index $requests "ephemeral-storage" | toString -}}
  {{- $esRequestSuffix := regexFind $unitPattern $esRequest -}}
  {{- $esRequest = trimSuffix $esRequestSuffix $esRequest -}}
  {{- if or (not $esRequestSuffix) (le (float64 $esRequest) 0.0) -}}
    {{- fail "Ephemeral-storage requests must be positive and use one of the following unit types: K, Ki, M, Mi, G, Gi" -}}
  {{- end -}}
  {{- if index $limits "ephemeral-storage" -}}
    {{- $esLimit := index $limits "ephemeral-storage" | toString -}}
    {{- $esLimitSuffix := regexFind $unitPattern $esLimit -}}
    {{- $esLimit = trimSuffix $esLimitSuffix $esLimit -}}
    {{- if or (not $esLimitSuffix) (le (float64 $esLimit) 0.0) -}}
      {{- fail "Ephemeral-storage limits must be positive and use one of the following unit types: K, Ki, M, Mi, G, Gi" -}}
    {{- end -}}
  {{- else -}}
    {{- $_ := set $resources.limits "ephemeral-storage" (index $requests "ephemeral-storage") -}}
  {{- end -}}
{{- end -}}
{{- /* Return resources */ -}}
{{- $resources | toYaml }}
{{- end -}}


{{- /*
Generates a container-level security context that conforms to the Kubernetes
restricted Pod Security Standards (PSS) profile. Drops ALL Linux capabilities
by default and optionally adds back specific named capabilities. Sets the
seccomp profile to RuntimeDefault. If only one of runAsUser or runAsGroup is
specified, the other defaults to match it.

Params:
  addCapabilities (list): (optional) Linux capability names to add back after
                          dropping ALL (e.g. ["NET_BIND_SERVICE"]).
  user (int):             (optional) UID to run the container as.
  group (int):            (optional) GID to run the container as. Defaults to
                          the value of "user" if only "user" is set, and
                          vice versa.

Returns:
  (string) YAML-encoded container security context.
*/ -}}
{{- define "pod.container.securityContext" -}}
allowPrivilegeEscalation: false
capabilities:
  {{- if gt (len (default list .addCapabilities)) 0 }}
  add:
    {{- range $capability := .addCapabilities }}
    - {{ $capability }}
    {{- end }}
  {{- end }}
  drop:
    - ALL
{{- $user := default "" .user }}
{{- $group := default "" .group }}
{{- if and $user (not $group) }}
  {{- $group = $user }}
{{- else if and $group (not $user) }}
  {{- $user = $group }}
{{- end -}}
{{- if $user }}
runAsUser: {{ .user }}
{{- end }}
{{- if $group }}
runAsGroup: {{ .group }}
{{- end }}
seccompProfile:
  type: "RuntimeDefault"
{{- end -}}


{{- /*
Generates a pod-level security context that conforms to the Kubernetes
restricted Pod Security Standards (PSS) profile, using the RuntimeDefault
seccomp profile. Defaults to running as non-root with UID and GID 10001.

Params:
  runAsNonRoot (bool): (optional) Whether to enforce non-root execution.
                       Defaults to true.
  user (int):          (optional) UID to run the pod as. Defaults to 10001.
  group (int):         (optional) GID to run the pod as. Defaults to 10001.

Returns:
  (string) YAML-encoded pod security context.
*/ -}}
{{- define "pod.securityContext" -}}
# PSS https://kubernetes.io/docs/concepts/security/pod-security-standards/
# restricted profile
seccompProfile:
  type: "RuntimeDefault"
runAsNonRoot: {{ dig "runAsNonRoot" true . }}
runAsUser: {{ default 10001 .user }}
runAsGroup: {{ default 10001 .group }}
{{- if .fsGroup }}
fsGroup: {{ .fsGroup }}
  {{- if .fsGroupChangePolicy }}
fsGroupChangePolicy: {{ .fsGroupChangePolicy }}
  {{- end }}
{{- end }}
{{- end -}}
