{{- /*
Builds the "backends" configuration structure expected by the
mozcloud-gateway-lib library chart. For each workload host, produces backend
entries that drive Service, BackendPolicy, and HealthCheckPolicy resource
generation.

When a host defines explicit "backends" entries, those are used as-is with
optional backendPolicy and healthCheck overrides. When no explicit backends are
defined, a default backend is generated for the workload with:
  - A Service on port 8080.
  - A BackendPolicy with access logging enabled (and optional IAP, sample rate,
    and timeout settings from host options).
  - A HealthCheckPolicy derived from host options or healthCheckEndpoints.

Params:
  workloads (dict): (required) The formatted workloads dict as returned by
                    mozcloud.formatter.workloads.

Returns:
  (string) YAML-encoded dict with a top-level "backends" key containing
           backend configurations keyed by backend or workload name.
*/ -}}
{{- define "mozcloud.gateway.backends" -}}
{{- $workloads := .workloads -}}
{{- $provider := index (index .Values "cloud" | default dict) "provider" | default "gke" -}}
backends:
  {{- range $workloadName, $workloadConfig := $workloads }}
  {{- range $hostName, $hostConfig := default (dict) $workloadConfig.hosts }}
  {{- if $hostConfig.backends }}
  {{- range $backend := (default (list) $hostConfig.backends) }}
  {{ $backend.name }}:
    component: {{ $workloadConfig.component }}
    api: {{ default "gateway" $hostConfig.api }}
    {{- if $backend.service }}
    service:
      {{- $backend.service | toYaml | nindent 6 }}
    {{- end }}
    {{- if and $backend.backendPolicy (eq $provider "gke") }}
    backendPolicy:
      targetRef:
        {{- if and $backend.backendPolicy.targetRef.kind (eq $backend.backendPolicy.targetRef.kind "ServiceImport" )}}
        {{- $_ := set $backend.backendPolicy.targetRef "group" "net.gke.io" }}
        {{- end }}
        group: {{ default "" $backend.backendPolicy.targetRef.group | quote }}
        kind: {{ $backend.backendPolicy.targetRef.kind }}
        name: {{ $backend.backendPolicy.targetRef.name }}
    {{- end }}
    {{- if and $backend.healthCheck (eq $provider "gke") }}
    healthCheck:
      path: {{ $backend.healthCheck.path }}
      {{- if ($backend.healthCheck).port }}
      port: {{ $backend.healthCheck.port }}
      {{- end }}
      {{- if ($backend.healthCheck).host }}
      host: {{ $backend.healthCheck.host }}
      {{- end }}
      targetRef:
        {{- if and $backend.healthCheck.targetRef.kind (eq $backend.healthCheck.targetRef.kind "ServiceImport" )}}
        {{- $_ := set $backend.healthCheck.targetRef "group" "net.gke.io" }}
        {{- end }}
        group: {{ default "" $backend.healthCheck.targetRef.group | quote }}
        kind: {{ default "Service" $backend.healthCheck.targetRef.kind }}
        name: {{ $backend.healthCheck.targetRef.name }}
    {{- end }}
  {{- end }}
  {{- else }}
  {{ $workloadName }}:
    component: {{ $workloadConfig.component }}
    api: {{ default "gateway" $hostConfig.api }}
    service:
      port: 8080
      targetPort: {{ include "mozcloud.portName" (default "http" $hostConfig.targetPort) }}
    {{- if eq $provider "gke" }}
    backendPolicy:
      logging:
        enabled: true
      {{- if ($hostConfig.options).logSampleRate }}
        {{- $sampleRate := $hostConfig.options.logSampleRate | float64 }}
        sampleRate: {{ mulf $sampleRate 10000 | int }}
      {{- end }}
      {{- if ($hostConfig.options).iap }}
      iap:
        {{- if $hostConfig.options.iap.enabled }}
        enabled: {{ $hostConfig.options.iap.enabled }}
        {{- end }}
        {{- if $hostConfig.options.iap.oauth2ClientId }}
        oauth2ClientId: {{ $hostConfig.options.iap.oauth2ClientId }}
        {{- end }}
        {{- if $hostConfig.options.iap.oauth2ClientSecret }}
        oauth2ClientSecret: {{ $hostConfig.options.iap.oauth2ClientSecret }}
        {{- end }}
      {{- end }}
      {{- if ($hostConfig.options).timeoutSec }}
      timeoutSec: {{ $hostConfig.options.timeoutSec | int }}
      {{- end }}
    healthCheck:
      {{- if (($hostConfig.options).healthCheck).host }}
      host: {{ $hostConfig.options.healthCheck.host }}
      {{- end }}
      {{- if (($hostConfig.options).healthCheck).port }}
      port: {{ $hostConfig.options.healthCheck.port }}
      {{- end }}
      {{- if (($hostConfig.options).healthCheck).path }}
      path: {{ $hostConfig.options.healthCheck.path }}
      {{- else if kindIs "string" (($hostConfig).healthCheckEndpoints).loadBalancer }}
      path: {{ default "/__lbheartbeat__" (($hostConfig).healthCheckEndpoints).loadBalancer }}
      {{- else if kindIs "map" (($hostConfig).healthCheckEndpoints).loadBalancer }}
      path: {{ default "/__lbheartbeat__" ($hostConfig.healthCheckEndpoints.loadBalancer).path }}
      {{- end }}
      protocol: HTTP
    {{- end }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end -}}

{{- $chartMetadata := dict "Chart" .Chart "Release" .Release }}
{{- $context := deepCopy . }}
{{- $labelParams := mergeOverwrite $chartMetadata (include "mozcloud.labelParams" . | fromYaml) }}
{{- /* Call a helper function that merges user data with defaults */}}
{{- $previewConfig := mergeOverwrite (default dict .Values.global.preview) (default dict .Values.preview) }}
{{- /* Get ALL workloads (unfiltered by api type) for backend processing
     This allows backends to be created even for hosts with api: none */}}
{{- $formatterParams := dict "workloads" (.Values.workloads | deepCopy) "preview" $previewConfig }}
{{- $workloads := dict "workloads" (include "mozcloud.formatter.workloads" $formatterParams | fromYaml) -}}

{{- /*
Backend services, backend policies, and health check policies.

Only create these for workloads with "api: gateway" or "api: none".
templates/ingress handles service creation for "api: ingress" workloads.
*/}}
{{- $backendParams := mergeOverwrite $context $workloads }}
{{- $backends := include "mozcloud.gateway.backends" $backendParams | fromYaml }}
{{- range $backendName, $backendConfig := $backends.backends }}
  {{- /* Only render backend resources if api is not ingress */}}
  {{- if ne $backendConfig.api "ingress" }}
    {{- $_ := set $labelParams "component_code" $backendConfig.component }}
    {{- $params := dict "backendConfig" (dict "backends" (dict $backendName (omit $backendConfig "component" "api"))) }}
{{ include "mozcloud-gateway-lib.service" (mergeOverwrite $params $labelParams) }}
  {{- end }}
{{- end }}
