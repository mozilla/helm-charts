{{- /*
This function configures the params for the gatewayPolicy template in the
mozcloud-gateway-lib library chart.
*/}}
{{- define "mozcloud.gateway.gatewayPolicy" -}}
sslPolicy: mozilla-intermediate
{{- end -}}

{{- /*
This function creates the value structure needed for gateway templates in the
mozcloud-gateway-lib library chart.

Params:

globals (dict): (required) Global values from .Values.global.mozcloud.
workloads (dict): (required) All of the workloads created using this chart. This
                  is populated below this function via the workload formatter
                  function.
*/}}
{{- define "mozcloud.gateway.gateways" -}}
{{- $globals := .globals -}}
{{- $workloads := .workloads }}
{{- /* Collect all unique gateway configurations */}}
{{- $gatewayConfigs := dict }}
{{- range $workloadName, $workloadConfig := $workloads }}
  {{- range $hostName, $hostConfig := default (dict) $workloadConfig.hosts }}
    {{- /* Skip if using a shared gateway */}}
    {{- if not ($hostConfig).sharedGateway }}
      {{- /* Build gateway configuration key based on unique attributes */}}
      {{- $className := "gke-l7-global-external-managed" }}
      {{- if ($hostConfig).multiCluster }}
        {{- $className = "gke-l7-global-external-managed-mc" }}
      {{- end }}
      {{- $addresses := list }}
      {{- if $hostConfig.addresses }}
        {{- $addresses = $hostConfig.addresses }}
      {{- else }}
        {{- $addresses = list (printf "%s-%s-ip-v4" $globals.app_code $globals.env_code) }}
      {{- end }}
      {{- $certs := list }}
      {{- if eq $hostConfig.type "external" }}
        {{- if gt (len (default (list) $hostConfig.tls.certs)) 0 }}
          {{- $certs = $hostConfig.tls.certs }}
        {{- else }}
          {{- $certs = list (printf "%s-%s-%s" $globals.app_code $globals.realm $globals.env_code) }}
        {{- end }}
      {{- end }}
      {{- /* Create a unique key for this gateway configuration */}}
      {{- $configKey := printf "%s-%s-%s" $hostConfig.type $className ($addresses | join "-") }}
      {{- if not (hasKey $gatewayConfigs $configKey) }}
        {{- $gatewayConfig := dict }}
        {{- $_ := set $gatewayConfig "type" $hostConfig.type }}
        {{- $_ = set $gatewayConfig "className" $className }}
        {{- $_ = set $gatewayConfig "addresses" $addresses }}
        {{- $_ = set $gatewayConfig "certs" $certs }}
        {{- $_ = set $gatewayConfigs $configKey $gatewayConfig }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- /* Generate gateways from unique configurations */}}
gateways:
  {{- $gatewayCount := len $gatewayConfigs }}
  {{- $hasMultipleTypes := gt $gatewayCount 1 }}
  {{- range $configKey, $gatewayConfig := $gatewayConfigs }}
  {{- $multiCluster := contains "-mc" $gatewayConfig.className }}
  {{- $gatewayNameParams := dict "appCode" $globals.app_code "type" $gatewayConfig.type "hasMultipleTypes" $hasMultipleTypes "multiCluster" $multiCluster }}
  {{- $gatewayName := include "gateway.name" $gatewayNameParams }}
  {{ $gatewayName }}:
    component: gateway
    type: {{ $gatewayConfig.type }}
    className: {{ $gatewayConfig.className }}
    addresses:
      {{- range $address := $gatewayConfig.addresses }}
      - {{ $address }}
      {{- end }}
    listeners:
      - name: http
        protocol: HTTP
        port: 80
      {{- if eq $gatewayConfig.type "external" }}
      - name: https
        protocol: HTTPS
        port: 443
      {{- end }}
    {{- if eq $gatewayConfig.type "external" }}
    tls:
      certs:
        {{- range $cert := $gatewayConfig.certs }}
        - {{ $cert }}
        {{- end }}
      type: certmap
    {{- end }}
  {{- end }}
{{- end -}}

{{- if .Values.enabled }}
{{- $chartMetadata := dict "Chart" .Chart "Release" .Release }}
{{- $context := deepCopy . }}
{{- $labelParams := mergeOverwrite $chartMetadata (include "mozcloud.labelParams" . | fromYaml) }}
{{- /* Call a helper function that merges user data with defaults */}}
{{- $previewConfig := mergeOverwrite (default dict .Values.global.preview) (default dict .Values.preview) }}
{{- /* Get only workloads where "api: gateway" is set */}}
{{- $formatterParams := dict "api" "gateway" "workloads" (.Values.workloads | deepCopy) "preview" $previewConfig }}
{{- $workloads := include "mozcloud.formatter.workloads" $formatterParams | fromYaml -}}

{{- /*
Only include Gateway and related resources if we have Gateway hosts defined
*/}}
{{- $hosts := list }}
{{- range $workloadName, $workloadConfig := $workloads }}
  {{- range $hostName, $hostConfig := $workloadConfig.hosts }}
    {{- $hosts = append $hosts $hostName }}
  {{- end }}
{{- end }}

{{- if gt (len $hosts) 0 }}
  {{- /*
  Gateways and Gateway policies - Skip if preview mode is using shared gateway
  */}}
  {{- if not (include "mozcloud.preview.usePreviewHttpRoute" .) }}
    {{- $params := mergeOverwrite $context (dict "globals" .Values.global.mozcloud "workloads" $workloads) }}
    {{- $gateways := include "mozcloud.gateway.gateways" $params | fromYaml }}
    {{- range $gatewayName, $gatewayConfig := $gateways.gateways }}
      {{- $_ := set $labelParams "component_code" $gatewayConfig.component }}
      {{- $params = dict "gatewayConfig" (dict "gateways" (dict $gatewayName (omit $gatewayConfig "component"))) }}
{{ include "mozcloud-gateway-lib.gateway" (mergeOverwrite $params $labelParams) }}
    {{- end }}
    {{- /* Prepare gatewayConfig with all gateways for policy rendering */}}
    {{- $allGatewaysConfig := dict }}
    {{- range $gatewayName, $gatewayConfig := $gateways.gateways }}
      {{- $_ := set $allGatewaysConfig $gatewayName (omit $gatewayConfig "component") }}
    {{- end }}
    {{- $gatewayPolicyConfig := include "mozcloud.gateway.gatewayPolicy" . | fromYaml }}
    {{- $_ := set $labelParams "component_code" "gateway" }}
    {{- $params = dict "gatewayConfig" (dict "gateways" $allGatewaysConfig) }}
    {{- $_ = set $params "gatewayPolicyConfig" $gatewayPolicyConfig }}
{{ include "mozcloud-gateway-lib.gatewayPolicy" (mergeOverwrite $params $labelParams) -}}
{{- end }}

{{- end -}}
{{- end }}
