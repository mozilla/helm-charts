{{- if .Values.enabled }}
{{- $chartMetadata := dict "Chart" .Chart "Release" .Release }}
{{- $labelParams := mergeOverwrite $chartMetadata (include "mozcloud.labelParams" . | fromYaml) }}
{{- /* Call a helper function that merges user data with defaults */}}
{{- $previewConfig := mergeOverwrite (default dict .Values.global.preview) (default dict .Values.preview) }}
{{- $formatterParams := dict "api" "gateway" "workloads" (.Values.workloads | deepCopy) "preview" $previewConfig }}
{{- $workloads := include "mozcloud.formatter.workloads" $formatterParams | fromYaml -}}
{{- /* Also get ALL workloads (unfiltered by api type) for backend processing
     This allows backends to be created even for hosts with api: none */}}
{{- $formatterParamsAll := dict "workloads" (.Values.workloads | deepCopy) "preview" $previewConfig }}
{{- $allWorkloads := include "mozcloud.formatter.workloads" $formatterParamsAll | fromYaml -}}

{{- /*
Only include Gateway and related resources if we have Gateway hosts defined
*/}}
{{- $hosts := list }}
{{- range $workloadName, $workloadConfig := $workloads }}
  {{- range $hostName, $hostConfig := $workloadConfig.hosts }}
    {{- $hosts = append $hosts $hostName }}
  {{- end }}
{{- end }}

{{- /* We will build $params as we go */}}
{{- $helperParams := mergeOverwrite (. | deepCopy) (dict "workloads" $workloads) }}
{{- $params := $labelParams -}}

{{- if gt (len $hosts) 0 -}}

{{- /*
Gateways and Gateway policies - Skip if preview mode is using shared gateway

Delete this section when it is time to move to shared gateways.
*/}}
{{- if not (include "mozcloud.preview.usePreviewHttpRoute" .) }}
{{- $gateways := include "mozcloud.config.gateways" $helperParams | fromYaml }}
{{- range $gatewayName, $gatewayConfig := $gateways.gateways }}
{{- $_ := set $labelParams "component_code" $gatewayConfig.component }}
{{- $_ = set $params "gatewayConfig" (dict "gateways" (dict $gatewayName (omit $gatewayConfig "component"))) }}
{{ include "mozcloud-gateway-lib.gateway" (mergeOverwrite $params $labelParams) }}
{{- end }}
{{- /* Prepare gatewayConfig with all gateways for policy rendering */}}
{{- $allGatewaysConfig := dict }}
{{- range $gatewayName, $gatewayConfig := $gateways.gateways }}
{{- $_ := set $allGatewaysConfig $gatewayName (omit $gatewayConfig "component") }}
{{- end }}
{{- $gatewayPolicyConfig := include "mozcloud.config.gatewayPolicy" . | fromYaml }}
{{- $_ := set $labelParams "component_code" "gateway" }}
{{- $_ = set $params "gatewayConfig" (dict "gateways" $allGatewaysConfig) }}
{{- $_ = set $params "gatewayPolicyConfig" $gatewayPolicyConfig }}
{{ include "mozcloud-gateway-lib.gatewayPolicy" (mergeOverwrite $params $labelParams) -}}
{{- end }}

{{- /*
HTTPRoutes - Skip if preview mode is using preview HTTPRoute
*/}}
{{- if not (include "mozcloud.preview.usePreviewHttpRoute" .) }}
{{- $httpRoutes := include "mozcloud.config.httpRoutes" $helperParams | fromYaml }}
{{- range $httpRouteName, $httpRouteConfig := $httpRoutes.httpRoutes }}
{{- $_ := set $labelParams "component_code" $httpRouteConfig.component }}
{{- $_ = set $params "httpRouteConfig" (dict "httpRoutes" (dict $httpRouteName (omit $httpRouteConfig "component"))) }}
{{ include "mozcloud-gateway-lib.httpRoute" (mergeOverwrite $params $labelParams) -}}
{{- end }}
{{- end }}

{{- end -}}

{{- /*
Backend services, backend policies, and health check policies
Only create these for workloads with api: gateway or api: none
(ingress.yaml handles Services for api: ingress workloads)
*/}}
{{- $backendParams := mergeOverwrite (. | deepCopy) (dict "workloads" $allWorkloads) }}
{{- $backends := include "mozcloud.config.backends" $backendParams | fromYaml }}
{{- range $backendName, $backendConfig := $backends.backends }}
  {{- /* Check if this backend's workload has only ingress hosts */}}
  {{- $workloadConfig := index $allWorkloads $backendName }}
  {{- $hasIngressHost := false }}
  {{- if $workloadConfig }}
    {{- range $hostName, $hostConfig := default (dict) $workloadConfig.hosts }}
      {{- $hostApi := default "gateway" $hostConfig.api }}
      {{- if eq $hostApi "ingress" }}
        {{- $hasIngressHost = true }}
      {{- end }}
    {{- end }}
  {{- end }}

  {{- /* Only render backend resources if workload doesn't have ingress hosts */}}
  {{- if not $hasIngressHost }}
{{- $_ := set $labelParams "component_code" $backendConfig.component }}
{{- $_ := set $params "backendConfig" (dict "backends" (dict $backendName (omit $backendConfig "component"))) }}
{{ include "mozcloud-gateway-lib.service" (mergeOverwrite $params $labelParams) }}
{{ include "mozcloud-gateway-lib.backendPolicy" (mergeOverwrite $params $labelParams) }}
{{ include "mozcloud-gateway-lib.healthCheckPolicy" (mergeOverwrite $params $labelParams) }}
  {{- end }}
{{- end }}

{{- end -}}
