{{- $chartMetadata := dict "Chart" .Chart "Release" .Release }}
{{- $context := deepCopy . }}
{{- $files := .Files }}
{{- $globals := .Values.global.mozcloud -}}
{{- $labelParams := mergeOverwrite $chartMetadata (include "mozcloud.labelParams" . | fromYaml) }}
{{- /* Format workloads, removing default container and merging user-defined values with defaults */}}
{{- $previewConfig := mergeOverwrite (default dict .Values.global.preview) (default dict .Values.preview) }}
{{- $formatterParams := dict "workloads" (.Values.workloads | deepCopy) "preview" $previewConfig }}
{{- $workloads := include "mozcloud.formatter.workloads" $formatterParams | fromYaml -}}
{{- /* In preview mode, use prefixed names matching ExternalSecret; otherwise maintain backwards compatibility */}}
{{- $prefix := include "mozcloud.preview.prefix" . }}
{{- $defaultSecretName := printf "%s%s-secrets" $prefix $globals.chart }}
{{- $defaultSecretEnabled := dig "default" "enabled" true (default dict .Values.externalSecrets) }}
{{- $defaultServiceAccount := printf "%s%s" $prefix $globals.app_code -}}

{{- range $workloadName, $workloadConfig := $workloads }}
{{- /* The NGINX sidecar will be created unless explicitly disabled or no hosts are defined */}}
{{- $nginxEnabled := true }}
{{- if or
  (not (dig "nginx" "enabled" "true" $workloadConfig))
  (not $workloadConfig.hosts)
}}
  {{- $nginxEnabled = false }}
{{- end }}
{{- $volumes := dict }}
{{- /* Format containers, removing default container and merging user-defined values with defaults */}}
{{- $formatterParams = dict "containers" $workloadConfig.containers "type" "containers" }}
{{- $containers := include "mozcloud.formatter.containers" $formatterParams | fromYaml }}
{{- /* Pre-populate volumes from all containers for annotation checksum calculation */}}
{{- range $containerName, $containerConfig := $containers }}
  {{- range $volume := $containerConfig.volumes }}
    {{- if not (hasKey $volumes $volume.name) }}
      {{- $_ := set $volumes $volume.name $volume }}
    {{- end }}
  {{- end }}
{{- end }}
{{- /* Add nginx configmap volume if nginx is enabled */}}
{{- $nginxConfigMapName := default (printf "%s-nginx" $workloadName) $workloadConfig.nginx.configMap }}
{{- if $nginxEnabled }}
  {{- $nginxVolume := dict "type" "configMap" }}
  {{- $_ := set $volumes $nginxConfigMapName $nginxVolume }}
{{- end }}
{{- if eq (default "deployment" $workloadConfig.type) "deployment" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $workloadName }}
  labels:
    {{- $component := dict "component_code" $workloadConfig.component }}
    {{- $params := dict "context" (mergeOverwrite (deepCopy $context) (mergeOverwrite (deepCopy $labelParams) $component)) }}
    {{- $labels := include "mozcloud.labels" $params | fromYaml }}
    {{- $labels.labels | toYaml | nindent 4 }}
  {{- $params = dict "annotations" (default dict $workloadConfig.annotations) "context" $context "type" "deployment" }}
  {{- $annotations := include "mozcloud.annotations" $params | fromYaml }}
  {{- if $annotations }}
  annotations:
    {{- $annotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- $labels.selectorLabels | toYaml | nindent 6 }}
  strategy:
    type: {{ default "RollingUpdate" $workloadConfig.strategy }}
  template:
    metadata:
      {{- /* Annotations, including OTEL if applicable */}}
      {{- $otelEnabled := dig "otel" "enabled" true $workloadConfig }}
      {{- $otelContainerNames := default list ($workloadConfig.otel).containers }}
      {{- $otelAutoInstrumentationEnabled := and $otelContainerNames (dig "otel" "autoInstrumentation" "enabled" false $workloadConfig) (($workloadConfig.otel).autoInstrumentation).language }}
      {{- $params = dict "context" (mergeOverwrite (deepCopy $context) (mergeOverwrite (deepCopy $labelParams) $component)) "otel" ($workloadConfig.otel) "type" "deployment" }}
      {{- $annotations := include "mozcloud.annotations" $params | fromYaml }}
      {{- /* Add checksum annotation for configmaps to trigger rolling updates when configmap changes */}}
      {{- $configMapChecksums := dict }}
      {{- if gt (keys $volumes | len) 0 }}
        {{- range $volumeName, $volumeConfig := $volumes }}
          {{- if eq $volumeConfig.type "configMap" }}
            {{- $configMapData := index (default dict $context.Values.configMaps) $volumeName }}
            {{- if $configMapData }}
              {{- $checksumKey := printf "checksum/configmap-%s" $volumeName }}
              {{- $_ := set $configMapChecksums $checksumKey ($configMapData | toYaml | sha256sum) }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- $annotations = mergeOverwrite (default dict $annotations) (default dict $configMapChecksums) }}
      {{- if $annotations }}
      annotations:
        {{- $annotations | toYaml | nindent 8 }}
      {{- end }}
      labels:
        {{- $labels.labels | toYaml | nindent 8 }}
    spec:
      containers:
        {{- /*
        NGINX container
        */}}
        {{- if $nginxEnabled }}
        - name: nginx
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          image: {{ $workloadConfig.nginx.image }}
          imagePullPolicy: Always
          lifecycle:
            preStop:
              exec:
                command: ["/bin/bash", "-c", "/bin/sleep 25 && /usr/sbin/nginx -s quit"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            {{- $cpu := default "50m" ($workloadConfig.nginx.resources).cpu }}
            {{- $memory := default "128Mi" ($workloadConfig.nginx.resources).memory }}
            {{- $resources := dict "requests" (dict "cpu" $cpu "memory" $memory) }}
            {{- include "pod.container.resources" $resources | nindent 12 }}
          readinessProbe:
            {{- /* Use first container in workload for NGINX readiness and liveness probe default values */}}
            {{- $container := dict }}
            {{- if ge (len $containers) 1 }}
              {{- $key := first (keys $containers) }}
              {{- $container = index $containers $key }}
            {{- end }}
            httpGet:
              {{- if (($container.healthCheck).readiness).httpHeaders }}
              httpHeaders:
                {{- $container.healthCheck.readiness.httpHeaders | toYaml | nindent 16 }}
              {{- end }}
              path: {{ default "/__lbheartbeat__" (($container.healthCheck).readiness).path }}
              port: http
            {{- $probeSettings := default dict (($container.healthCheck).readiness).probes }}
            initialDelaySeconds: {{ default 10 ($probeSettings.initialDelaySeconds) }}
            periodSeconds: {{ default 6 ($probeSettings.periodSeconds) }}
            timeoutSeconds: {{ default 5 ($probeSettings.timeoutSeconds) }}
            successThreshold: {{ default 1 ($probeSettings.successThreshold) }}
            failureThreshold: {{ default 5 ($probeSettings.failureThreshold) }}
          livenessProbe:
            httpGet:
              path: /__nginxheartbeat__
              port: http
            {{- $probeSettings = default dict (($container.healthCheck).liveness).probes }}
            initialDelaySeconds: {{ default 5 ($probeSettings.initialDelaySeconds) }}
            periodSeconds: {{ default 6 ($probeSettings.periodSeconds) }}
            timeoutSeconds: {{ default 2 ($probeSettings.timeoutSeconds) }}
            successThreshold: {{ default 1 ($probeSettings.successThreshold) }}
            failureThreshold: {{ default 5 ($probeSettings.failureThreshold) }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
        {{- end -}}

        {{- /*
        App containers
        */}}
        {{- range $containerName, $containerConfig := $containers }}
        {{- $portName := include "mozcloud.portName" $containerName }}
        - name: {{ $containerName }}
          {{- /*
          We first look for an image and tag in the container config YAML. If
          those are not defined, we default to image.repository and image.tag
          in .Values.global.mozcloud. These can be configured in tenant files.

          If neither is defined, we want to throw errors.
          */}}
          {{- if and (not ($containerConfig.image).repository) (not ($globals.image).repository) }}
            {{- $failMessage := printf "A fully qualified image path must be configured in either \".Values.mozcloud.workloads.%s.containers.%s.image.repository\" or \".Values.global.mozcloud.image.repository\"." $workloadName $containerName }}
            {{- fail $failMessage }}
          {{- end }}
          {{- $image := default ($globals.image).repository ($containerConfig.image).repository }}
          {{- if and (not ($containerConfig.image).tag) (not ($globals.image).tag) }}
            {{- $failMessage := printf "An image tag must be configured in either \".Values.mozcloud.workloads.%s.containers.%s.image.tag\" or \".Values.global.mozcloud.image.tag\".      " $workloadName $containerName }}
            {{- fail $failMessage }}
          {{- end }}
          {{- $tag := default ($globals.image).tag ($containerConfig.image).tag }}
          image: {{ printf "%s:%s" $image $tag }}
          imagePullPolicy: {{ $containerConfig.imagePullPolicy }}
          {{- if $containerConfig.command }}
          command:
            {{- range $line := $containerConfig.command }}
            - {{ $line | quote }}
            {{- end }}
          {{- end }}
          {{- if $containerConfig.args }}
          args:
            {{- range $line := $containerConfig.args }}
            - {{ $line | quote }}
            {{- end }}
          {{- end }}
          {{- $otelContainerEnabled := and $otelEnabled (not $otelAutoInstrumentationEnabled) (has $containerName $otelContainerNames) }}
          {{- if or $containerConfig.envVars $otelContainerEnabled $containerConfig.envFromFields }}
          env:
            {{- if $otelContainerEnabled }}
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
            {{- end }}
            {{- range $fieldName, $fieldPath := $containerConfig.envFromFields }}
            - name: {{ $fieldName }}
              valueFrom:
                fieldRef:
                  fieldPath: {{ $fieldPath }}
            {{- end }}
            {{- range $envVarKey, $envVarValue := $containerConfig.envVars }}
            - name: {{ $envVarKey }}
              value: {{ $envVarValue | quote }}
            {{- end }}
          {{- end }}
          {{- if or $containerConfig.configMaps $defaultSecretEnabled $containerConfig.secrets }}
          envFrom:
            {{- if $containerConfig.configMaps }}
            {{- range $configMap := $containerConfig.configMaps }}
            - configMapRef:
                name: {{ printf "%s%s" $prefix $configMap }}
            {{- end }}
            {{- end }}
            {{- if $defaultSecretEnabled }}
            - secretRef:
                name: {{ $defaultSecretName }}
            {{- end }}
            {{- if $containerConfig.secrets }}
            {{- range $secret := $containerConfig.secrets }}
            - secretRef:
                name: {{ printf "%s%s" $prefix $secret }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if or
              $workloadConfig.hosts
              (($containerConfig.healthCheck).readiness).enabled
              (($containerConfig.healthCheck).liveness).enabled
          }}
          ports:
            - name: {{ $portName }}
              containerPort: {{ $containerConfig.port }}
          {{- end }}
          {{- if (dig "healthCheck" "liveness" "enabled" true $containerConfig) }}
          livenessProbe:
            httpGet:
              {{- if (($containerConfig.healthCheck).liveness).httpHeaders }}
              httpHeaders:
                {{- range $header := $containerConfig.healthCheck.liveness.httpHeaders }}
                - name: {{ $header.name }}
                  value: {{ $header.value }}
                {{- end }}
              {{- else if (($containerConfig.healthCheck).readiness).httpHeaders }}
              httpHeaders:
                {{- range $header := $containerConfig.healthCheck.readiness.httpHeaders }}
                - name: {{ $header.name }}
                  value: {{ $header.value }}
                {{- end }}
              {{- end }}
              path: {{ default "/__lbheartbeat__" $containerConfig.healthCheck.liveness.path }}
              port: {{ $portName }}
            {{- /* If liveness probe settings are defined, use those */}}
            {{- if (($containerConfig.healthCheck).liveness).probes }}
            {{- range $k, $v := $containerConfig.healthCheck.liveness.probes }}
            {{ $k }}: {{ $v }}
            {{- end }}
            {{- /* Otherwise, use readiness probe settings, if defined */}}
            {{- else if (($containerConfig.healthCheck).readiness).probes }}
            {{- range $k, $v := $containerConfig.healthCheck.readiness.probes }}
            {{ $k }}: {{ $v }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if (dig "healthCheck" "readiness" "enabled" true $containerConfig) }}
          readinessProbe:
            httpGet:
              {{- if (($containerConfig.healthCheck).readiness).httpHeaders }}
              httpHeaders:
                {{- range $header := $containerConfig.healthCheck.readiness.httpHeaders }}
                - name: {{ $header.name }}
                  value: {{ $header.value }}
                {{- end }}
              {{- end }}
              path: {{ default "/__lbheartbeat__" $containerConfig.healthCheck.readiness.path }}
              port: {{ $portName }}
            {{- if (($containerConfig.healthCheck).readiness).probes }}
            {{- range $k, $v := $containerConfig.healthCheck.readiness.probes }}
            {{ $k }}: {{ $v }}
            {{- end }}
            {{- end }}
          {{- end }}
          resources:
            {{- $resourceParams := dict "requests" (dict "cpu" $containerConfig.resources.cpu "memory" $containerConfig.resources.memory) }}
            {{- include "pod.container.resources" $resourceParams | nindent 12 }}
          securityContext:
            {{- include "pod.container.securityContext" (default dict $containerConfig.security) | nindent 12 }}
          {{- if $containerConfig.volumes }}
          volumeMounts:
            {{- range $volume := $containerConfig.volumes }}
            - name: {{ $volume.name }}
              mountPath: {{ $volume.path }}
              {{- if $volume.key }}
              subPath: {{ $volume.key }}
              {{- end }}
              {{- if eq $volume.type "secret" }}
              readOnly: true
              {{- else if $volume.readOnly }}
              readOnly: {{ $volume.readOnly }}
              {{- end }}
              {{- if not (hasKey $volumes $volume.name) }}
              {{- $_ := set $volumes $volume.name $volume }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end -}}

      {{- /*
      Init containers
      */}}
      {{- $formatterParams = dict "containers" (default dict $workloadConfig.initContainers) "type" "init-containers" }}
      {{- $initContainers := include "mozcloud.formatter.containers" $formatterParams | fromYaml }}
      {{- if $initContainers }}
      initContainers:
        {{- range $containerName, $containerConfig := $initContainers }}
        {{- $portName := include "mozcloud.portName" $containerName }}
        - name: {{ $containerName }}
          {{- /*
          We first look for an image and tag in the container config YAML. If
          those are not defined, we default to image.repository and image.tag
          in .Values.global.mozcloud. These can be configured in tenant files.

          If neither is defined, we want to throw errors.
          */}}
          {{- if and (not ($containerConfig.image).repository) (not ($globals.image).repository) }}
            {{- $failMessage := printf "A fully qualified image path must be configured in either \".Values.mozcloud.workloads.%s.initContainers.%s.image.repository\" or \".Values.global.mozcloud.image.repository\"." $workloadName $containerName }}
            {{- fail $failMessage }}
          {{- end }}
          {{- $image := default ($globals.image).repository ($containerConfig.image).repository }}
          {{- if and (not ($containerConfig.image).tag) (not ($globals.image).tag) }}
            {{- $failMessage := printf "An image tag must be configured in either \".Values.mozcloud.workloads.%s.initContainers.%s.image.tag\" or \".Values.global.mozcloud.image.tag\".      " $workloadName $containerName }}
            {{- fail $failMessage }}
          {{- end }}
          {{- $tag := default ($globals.image).tag ($containerConfig.image).tag }}
          image: {{ printf "%s:%s" $image $tag }}
          imagePullPolicy: {{ $containerConfig.imagePullPolicy }}
          {{- if $containerConfig.command }}
          command:
            {{- range $line := $containerConfig.command }}
            - {{ $line | quote }}
            {{- end }}
          {{- end }}
          {{- if $containerConfig.args }}
          args:
            {{- range $line := $containerConfig.args }}
            - {{ $line | quote }}
            {{- end }}
          {{- end }}
          {{- if $containerConfig.env }}
          env:
            {{- range $envVarKey, $envVarValue := $containerConfig.env }}
            - name: {{ $envVarKey }}
              value: {{ $envVarValue | quote }}
            {{- end }}
          {{- end }}
          {{- if or $containerConfig.configMaps $defaultSecretEnabled $containerConfig.secrets }}
          envFrom:
            {{- if $containerConfig.configMaps }}
            {{- range $configMap := $containerConfig.configMaps }}
            - configMapRef:
                name: {{ printf "%s%s" $prefix $configMap }}
            {{- end }}
            {{- end }}
            {{- if $defaultSecretEnabled }}
            - secretRef:
                name: {{ $defaultSecretName }}
            {{- end }}
            {{- if $containerConfig.secrets }}
            {{- range $secret := $containerConfig.secrets }}
            - secretRef:
                name: {{ printf "%s%s" $prefix $secret }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- if or
              $workloadConfig.hosts
              (($containerConfig.healthCheck).readiness).enabled
              (($containerConfig.healthCheck).liveness).enabled
          }}
          ports:
            - name: {{ $portName }}
              containerPort: {{ $containerConfig.port }}
          {{- end }}
          resources:
            {{- $resourceParams := dict "requests" (dict "cpu" $containerConfig.resources.cpu "memory" $containerConfig.resources.memory) }}
            {{- include "pod.container.resources" $resourceParams | nindent 12 }}
          {{- /* Sidecars run as init containers need restartPolicy: Always configured */}}
          {{- if (dig "sidecar" false $containerConfig) }}
          restartPolicy: Always
          {{- end }}
          securityContext:
            {{- include "pod.container.securityContext" (default dict $containerConfig.securityContext) | nindent 12 }}
          {{- if $containerConfig.volumes }}
          volumeMounts:
            {{- range $volume := $containerConfig.volumes }}
            - name: {{ $volume.name }}
              mountPath: {{ $volume.path }}
              {{- if $volume.key }}
              subPath: {{ $volume.key }}
              {{- end }}
              {{- if eq $volume.type "secret" }}
              readOnly: true
              {{- else if $volume.readOnly }}
              readOnly: {{ $volume.readOnly }}
              {{- end }}
              {{- if not (hasKey $volumes $volume.name) }}
              {{- $_ := set $volumes $volume.name $volume }}
              {{- end }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      securityContext:
        {{- $runAsNonRoot := true }}
        {{- if ($workloadConfig.security).runAsRoot }}
          {{- $runAsNonRoot = false }}
        {{- end }}
        {{- $_ := set $workloadConfig.security "runAsNonRoot" $runAsNonRoot }}
        {{- include "pod.securityContext" (omit $workloadConfig.security "runAsRoot") | nindent 8 }}
      serviceAccountName: {{ default $defaultServiceAccount $workloadConfig.serviceAccount }}
      {{- if $workloadConfig.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ $workloadConfig.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if $workloadConfig.affinity }}
      affinity:
        {{- $workloadConfig.affinity | toYaml | nindent 8 }}
      {{- end }}
      {{- if $workloadConfig.nodeSelector }}
      nodeSelector:
        {{- $workloadConfig.nodeSelector | toYaml | nindent 8 }}
      {{- end }}
      {{- if $workloadConfig.tolerations }}
      tolerations:
        {{- $workloadConfig.tolerations | toYaml | nindent 8 }}
      {{- end }}
      {{- if or $nginxEnabled (gt (keys $volumes | len) 0) }}
      volumes:
        {{- include "mozcloud.workload.volumes" (dict
          "volumes" $volumes
          "nginxEnabled" $nginxEnabled
          "nginxConfigMapName" $nginxConfigMapName
        ) | nindent 8 }}
      {{- end }}
{{- if and $nginxEnabled (not $workloadConfig.nginx.configMap) }}
---
{{- include "mozcloud.workload.nginxConfigMap" (dict
  "config" $workloadConfig
  "labels" $labels
  "name" $workloadName
) }}
{{- end }}
{{- end }}
{{- end }}
