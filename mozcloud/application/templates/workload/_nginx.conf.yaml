{{- /*
Returns the default nginx configuration file content for the NGINX sidecar
container used in workload deployments. The config sets up a reverse proxy on
port 8080 that forwards all traffic to the app container at 127.0.0.1:8000.

Key settings:
  - Structured JSON access logging (time, remote addr, status, trace, etc.).
  - HSTS header on all responses.
  - Gzip compression for common text/web content types.
  - Keepalive timeout of 620 seconds (to accommodate GCP load balancer idle
    timeouts).
  - /__nginxheartbeat__ endpoint returning 200 for NGINX liveness probes.
  - /nginx_status stub endpoint for local metrics (localhost-only).

Params:
  None.

Returns:
  (string) The nginx.conf file content as a plain text string.
*/ -}}
{{- define "workload.nginx.conf" -}}
# The nginx docker container has ln -sf /dev/stderr /var/log/nginx/error.log
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections  2048;
}

http {
    include       /etc/nginx/mime.types;

    default_type  application/octet-stream;

    log_format main escape=json
    '{'
      '"time":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"remote_user":"$remote_user",'
      '"request":"$request",'
      '"status": "$status",'
      '"log_type": "access",'
      '"bytes_sent": $body_bytes_sent,'
      '"request_time": $request_time,'
      '"referrer":"$http_referer",'
      '"user_agent":"$http_user_agent",'
      '"x_forwarded_for":"$http_x_forwarded_for",'
      '"x_forwarded_proto":"$http_x_forwarded_proto",'
      '"trace":"$http_x_cloud_trace_context"'
    '}';

    # The nginx docker container has ln -sf /dev/stdout /var/log/nginx/access.log
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  620;

    server_tokens off;

    gzip on;
    gzip_http_version 1.1;
    gzip_comp_level 1;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";
    gzip_min_length 1100;
    gzip_types
        text/plain
        text/css
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/javascript;

    upstream upstream_docker {
        server 127.0.0.1:8000;
    }

    server {
        listen 8080;

        client_max_body_size 2g;

        add_header Strict-Transport-Security "max-age=31536000" always;

        location / {
            proxy_set_header x-forwarded-proto $http_x_forwarded_proto;
            proxy_set_header x-forwarded-for $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://upstream_docker;
        }

        location = /nginx_status {
          stub_status on;
          access_log off;
          allow 127.0.0.1;
          deny all;
        }

        location = /__nginxheartbeat__ {
          return 200;
        }
    }
}
{{- end -}}
