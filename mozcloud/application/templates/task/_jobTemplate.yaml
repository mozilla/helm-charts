{{- /*
Shared job spec template used by both job.yaml and cronjob.yaml to render the
full Kubernetes Job spec. Changes here affect all Jobs and CronJobs rendered
by this chart.

Merges common task configuration with the job-specific config before rendering
to allow shared defaults (e.g. resource requests, security config) to be
defined once and applied across all jobs.

Renders the complete Job spec including:
  - Optional top-level fields: activeDeadlineSeconds, backoffLimit,
    parallelism, suspend, ttlSecondsAfterFinished.
  - Pod template with OTEL annotations if applicable.
  - Container definitions (image, command, args, env, envFrom, resources,
    security context, and volume mounts).
  - Pod-level security context.
  - Optional service account reference.
  - Volumes derived from container volume mount definitions.

Params:
  common (dict):  (optional) Common task configuration from
                  .Values.tasks.common.
  config (dict):  (required) The job configuration for this specific job
                  (e.g. from .Values.tasks.jobs.<job_name> or a CronJob's
                  jobConfig block).
  context (dict): (required) The Helm root context from the calling template.

Returns:
  (string) YAML-encoded Kubernetes Job spec body, from top-level fields
           through the volumes list.
*/ -}}
{{- define "mozcloud.job.jobTemplate" -}}
{{- $common := deepCopy .common }}
{{- $context := .context }}
{{- $jobConfig := mergeOverwrite (default (dict) $common.job) .config }}
{{- $prefix := include "mozcloud.preview.prefix" $context }}
{{- $volumes := dict }}
{{- /* Compute labels for the pod template using the mozcloud-labels library */ -}}
{{- $chartMetadata := dict "Chart" $context.Chart "Release" $context.Release }}
{{- $labelParams := mergeOverwrite $chartMetadata (include "mozcloud.labelParams" $context | fromYaml) }}
{{- $labelsParams := dict "context" (mergeOverwrite (deepCopy $context) $labelParams) "labels" (default (dict) $jobConfig.labels) }}
{{- $podLabels := (include "mozcloud.labels" $labelsParams | fromYaml).labels }}
{{- if $jobConfig.activeDeadlineSeconds }}
activeDeadlineSeconds: {{ $jobConfig.activeDeadlineSeconds }}
{{- end }}
{{- if $jobConfig.backoffLimit }}
backoffLimit: {{ $jobConfig.backoffLimit }}
{{- end }}
{{- if $jobConfig.parallelism }}
parallelism: {{ $jobConfig.parallelism }}
{{- end }}
{{- if $jobConfig.suspend }}
suspend: {{ $jobConfig.suspend }}
{{- end }}
{{- if $jobConfig.ttlSecondsAfterFinished }}
ttlSecondsAfterFinished: {{ $jobConfig.ttlSecondsAfterFinished }}
{{- end }}
template:
  {{- /* Annotations, including OTEL if applicable */}}
  {{- $otelEnabled := dig "otel" "enabled" true $jobConfig }}
  {{- $otelContainerNames := default list ($jobConfig.otel).containers }}
  {{- $otelAutoInstrumentationEnabled := and $otelContainerNames (dig "otel" "autoInstrumentation" "enabled" false $jobConfig) (($jobConfig.otel).autoInstrumentation).language }}
  {{- $enrichedContext := mergeOverwrite (deepCopy $context) $labelParams }}
  {{- $params := dict "context" $enrichedContext "otel" ($jobConfig.otel) "type" "job" }}
  {{- $annotations := include "mozcloud.annotations" $params | fromYaml }}
  metadata:
    labels:
      {{- $podLabels | toYaml | nindent 6 }}
    {{- if $annotations }}
    annotations:
      {{- $annotations | toYaml | nindent 6 }}
    {{- end }}
  spec:
    containers:
      {{- $params = dict "containers" $jobConfig.containers "type" "containers" }}
      {{- $containers := include "mozcloud.formatter.containers" $params | fromYaml }}
      {{- range $containerName, $containerConfig := $containers }}
        {{- $containerConfig = mergeOverwrite (deepCopy (default (dict) $common.container)) $containerConfig }}
      - name: {{ $containerName }}
        {{- $globalImage := default (dict) $context.Values.global.mozcloud.image }}
        {{- $imageRepo := default (($globalImage).repository) ($containerConfig.image).repository }}
        {{- $imageTag := default (($globalImage).tag) ($containerConfig.image).tag }}
        {{- if not $imageRepo }}
        {{- fail (printf "%sContainer image repository must be set! You can set this in either .Values.mozcloud.tasks.jobs.%s.containers[].image.repository or .Values.global.mozcloud.image.repository" $jobConfig.name) }}
        {{- end }}
        {{- if not $imageTag }}
        {{- fail (printf "%sContainer image tag must be set! You can set this in either .Values.mozcloud.tasks.jobs.%s.containers[].image.tag or .Values.global.mozcloud.image.tag" $jobConfig.name) }}
        {{- end }}
        image: {{ $imageRepo }}:{{ $imageTag }}
        imagePullPolicy: Always
        {{- if $containerConfig.command }}
        command:
          {{- range $line := $containerConfig.command }}
          - {{ $line | quote }}
          {{- end }}
        {{- end }}
        {{- if $containerConfig.args }}
        args:
          {{- range $line := $containerConfig.args }}
          - {{ $line | quote }}
          {{- end }}
        {{- end }}
        {{- $otelContainerEnabled := and $otelEnabled (not $otelAutoInstrumentationEnabled) (has $containerName $otelContainerNames) }}
        {{- /*
        If OTEL is enabled but auto instrumentation is disabled, we need to
        create the HOST_IP environment variable directly in the container.
        */}}
        {{- if or $containerConfig.envVars $otelContainerEnabled }}
        env:
          {{- if $otelContainerEnabled }}
          - name: HOST_IP
            valueFrom:
              fieldRef:
                apiVersion: v1
                fieldPath: status.hostIP
          {{- end }}
          {{- range $envVarName, $envVarValue := $containerConfig.envVars }}
          - name: {{ $envVarName }}
            value: {{ $envVarValue | quote }}
          {{- end }}
        {{- end }}
        {{- if or $containerConfig.configMaps $containerConfig.externalSecrets }}
        envFrom:
          {{- range $configMap := default (list) $containerConfig.configMaps }}
          - configMapRef:
              name: {{ printf "%s%s" $prefix $configMap }}
          {{- end }}
          {{- range $secret := default (list) $containerConfig.externalSecrets }}
          - secretRef:
              name: {{ printf "%s%s" $prefix $secret }}
          {{- end }}
        {{- end }}
        {{- /*
        We automatically calculate limits by doubling requests using the helper function
        below.

        This function can be found in templates/_pod.yaml
        */}}
        {{- $params = dict "requests" (dict "cpu" $containerConfig.resources.cpu "memory" $containerConfig.resources.memory) }}
        {{- $resources := include "pod.container.resources" $params | fromYaml }}
        resources:
          requests:
            cpu: {{ $resources.requests.cpu | quote }}
            memory: {{ $resources.requests.memory | quote }}
          limits:
            cpu: {{ $resources.limits.cpu | quote }}
            memory: {{ $resources.limits.memory | quote }}
        {{- /*
        The container security context helper function can be found in templates/_pod.yaml
        */}}
        securityContext:
          {{- include "pod.container.securityContext" (default dict $containerConfig.security) | nindent 10 }}
        {{- if $containerConfig.volumes }}
        volumeMounts:
          {{- range $volume := $containerConfig.volumes }}
          - name: {{ $volume.name }}
            mountPath: {{ $volume.path }}
            {{- if $volume.key }}
            subPath: {{ $volume.key }}
            {{- end }}
            {{- if eq $volume.type "secret" }}
            readOnly: true
            {{- else if $volume.readOnly }}
            readOnly: {{ $volume.readOnly }}
            {{- end }}
            {{- if not (hasKey $volumes $volume.name) }}
            {{- $_ := set $volumes $volume.name $volume }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- if $jobConfig.restartPolicy }}
    restartPolicy: {{ $jobConfig.restartPolicy }}
    {{- end }}
    {{- /*
    The pod security context helper function can be found in templates/_pod.yaml
    */}}
    securityContext:
      {{- $runAsNonRoot := ternary false true (dig "security" "runAsRoot" false $jobConfig) }}
      {{- $params := mergeOverwrite (omit (default dict $jobConfig.security) "runAsRoot") (dict "runAsNonRoot" $runAsNonRoot) }}
      {{- include "pod.securityContext" $params | nindent 6 }}
    {{- if $jobConfig.serviceAccount }}
    serviceAccountName: {{ printf "%s%s" $prefix $jobConfig.serviceAccount }}
    {{- end }}
    {{- if gt (keys $volumes | len) 0 }}
    volumes:
      {{- range $volumeName, $volumeConfig := $volumes }}
      - name: {{ $volumeName }}
        {{- if eq $volumeConfig.type "persistentVolume" }}
        persistentVolumeClaim:
          claimName: {{ $volumeName }}
        {{- else if eq $volumeConfig.type "configMap" }}
        configMap:
          name: {{ $volumeName }}
        {{- else if eq $volumeConfig.type "secret" }}
        secret:
          secretName: {{ $volumeName }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end -}}
