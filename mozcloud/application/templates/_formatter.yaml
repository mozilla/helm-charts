{{/*
Formatting helpers
*/}}

{{- /*
This function will attempt to merge user-defined containers with the default
container configuration found in either of the following locations:

  - .Values.tasks.jobs.mozcloud-job.containers.mozcloud-container
  - .Values.workloads.mozcloud-workload.containers.mozcloud-container

Params:

containers (dict): (required) Configurations for all containers in question.
type (string): (required) Either "containers" or "init-containers", depending on the type of container.
*/ -}}
{{- define "mozcloud.formatter.containers" -}}
{{- $containerValues := .containers -}}
{{- $containers := .containers -}}
{{- $defaultKey := ternary "mozcloud-init-container" "mozcloud-container" (eq .type "init-containers") -}}
{{- /* Remove default containers key and merge with user-defined keys, if defined */ -}}
{{- if or
  (and (eq (keys $containerValues | len) 1) (eq (keys $containerValues | first) $defaultKey))
  (gt (keys $containerValues | len) 1)
}}
  {{- $containers = omit $containers $defaultKey -}}
  {{- range $name, $config := $containers -}}
    {{- $defaults := index $containerValues $defaultKey -}}
    {{- $_ := set $containers $name (mergeOverwrite ($defaults | deepCopy) $config) -}}
  {{- end -}}
{{- end -}}
{{ $containers | toYaml }}
{{- end -}}


{{- define "mozcloud.formatter.host" -}}
{{- $component := .component -}}
{{- $hosts := .hosts -}}
{{- $output := dict -}}
{{- $workloadName := .workloadName -}}
{{- range $hostName, $hostConfig := $hosts -}}
  {{- if and (eq $hostConfig.api $component) (not (hasKey $output $workloadName)) -}}
    {{- /*
    If, for some reason, a user does not set a real name under
    .Values.workloads.hosts, use the workload name.
    */}}
    {{- if eq $hostName "name" -}}
      {{- $hostName = $workloadName -}}
    {{- end -}}
    {{- $_ := set $output $hostName $hostConfig -}}
  {{- end -}}
{{- end -}}
{{ $output | toYaml }}
{{- end -}}

{{- define "mozcloud.formatter.workloads" -}}
{{- $api := .api -}}
{{- $workloadValues := .workloads -}}
{{- $workloads := .workloads -}}
{{- /* Remove default workloads key and merge with user-defined keys, if defined */}}
{{- if or
  (and (eq (keys $workloadValues | len) 1) (keys $workloadValues | first) "mozcloud-workload")
  (gt (keys $workloadValues | len) 1)
}}
  {{- $workloads = omit $workloads "mozcloud-workload" -}}
  {{- range $name, $config := $workloads -}}
    {{- $defaultWorkload := index $workloadValues "mozcloud-workload" -}}
    {{- /* Merge host configs with defaults */}}
    {{- $hostValues := $defaultWorkload.hosts -}}
    {{- $hosts := dict -}}
    {{- $configHosts := default (dict) $config.hosts -}}
    {{- range $hostName, $hostConfig := $configHosts -}}
      {{- $_ := set $hosts $hostName (mergeOverwrite ($hostValues.name | deepCopy) $hostConfig) -}}
    {{- end -}}
    {{- if gt (keys $hosts | len) 0 -}}
      {{- /*
      If an api parameter is provided, filter hosts to only those matching that API type.
      If no api parameter is provided, return all hosts regardless of API type.
      */ -}}
      {{- if and $api (or (eq $api "gateway") (eq $api "ingress")) -}}
        {{- $helperParams := dict "component" $api "hosts" $hosts "workloadName" $name -}}
        {{- $hosts = include "mozcloud.formatter.host" $helperParams | fromYaml -}}
      {{- end -}}
      {{- $_ := set $config "hosts" $hosts -}}
    {{- end -}}
    {{- $defaults := omit $defaultWorkload "hosts" -}}
    {{- $_ := set $workloads $name (mergeOverwrite ($defaults | deepCopy) $config) -}}
  {{- end -}}
{{- end -}}
{{- /* Apply preview prefix to workload names if in preview mode */ -}}
{{- $previewConfig := dig "preview" dict . -}}
{{- if and ($previewConfig.enabled) ($previewConfig.pr) -}}
  {{- $prefix := printf "pr%v-" $previewConfig.pr -}}
  {{- $prefixedWorkloads := dict -}}
  {{- range $name, $config := $workloads -}}
    {{- $prefixedName := printf "%s%s" $prefix $name -}}
    {{- $_ := set $prefixedWorkloads $prefixedName $config -}}
  {{- end -}}
  {{- $workloads = $prefixedWorkloads -}}
{{- end -}}
{{- range $name, $config := $workloads -}}
  {{- if not $config.component -}}
    {{- $failMessage := printf "A component was not defined for workload \"%s\". You must define a component in \".Values.mozcloud.workloads.%s.component\". See values.yaml in the mozcloud-workload chart for more details." $name $name -}}
    {{- fail $failMessage -}}
  {{- end -}}
{{- end -}}
{{ $workloads | toYaml }}
{{- end -}}
