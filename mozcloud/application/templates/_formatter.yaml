{{- /*
# Formatter helpers — background and rationale

Formatter helpers solve a specific limitation of Helm's values merging: Helm
can deep-merge dicts across values files (e.g. values.yaml + values-dev.yaml),
but it cannot merge lists — it replaces them wholesale. This means that if
workloads, containers, or hosts were defined as lists, users would have no way
to set chart-level defaults and then selectively override individual items in
environment-specific values files.

To work around this, all collections that need default + override behavior are
defined as dicts, where the key is the object's name and the value is its
configuration. Helm can deep-merge dicts, so a user can define a workload in
values.yaml and override specific fields in values-dev.yaml without repeating
the entire definition.

This still left the problem of where to put chart-level defaults. The solution
is a set of protected keys — one per collection type — that act as default
templates within the dict:

  Collection        Protected key
  ----------        -------------
  workloads         default
  containers        default
  init-containers   default
  cronJobs          default
  jobs              default

Users are instructed in values.yaml not to name their objects after these keys.
If a user defines only a single object and names it after the protected key
(e.g. only one workload called "default"), that object is treated as
a regular workload and rendered as-is rather than stripped and used only as a
defaults source.

Each formatter function:
  1. Receives the raw dict (which may contain the protected default key and/or
     user-defined named entries) from the calling template.
  2. Strips the protected key from the working copy of the dict.
  3. Deep-merges the protected key's values as a base under each user-defined
     entry, with the user's values taking precedence (mergeOverwrite).
  4. Returns the consolidated dict for use by the calling template.

This allows chart maintainers to set sensible defaults in values.yaml under
the protected keys without those defaults ever rendering as real Kubernetes
objects.
*/ -}}

{{- /*
Formatter for container and init-container configurations. Merges each
user-defined container entry with defaults from the protected key
("default" for both containers and init-containers), then returns the consolidated containers dict.

The protected key acts as a defaults template: it is stripped from the output
and its values are deep-merged as a base under each named container. If only
the protected key is present (no user-defined containers), it is passed through
as-is so that the single default container still renders.

See the formatter background notes in _formatter.yaml for the full rationale.

Params:
  containers (dict): (required) The containers dict from values. May contain
                     the protected default key and/or user-defined named
                     container entries (e.g.
                     .Values.workloads.<name>.containers).
  type (string):     (required) Determines which protected key to use.
                     Accepted values: "containers", "init-containers".

Returns:
  (string) YAML-encoded dict of consolidated container configurations, keyed
           by container name.

Example:
  Input:
    containers:
      default:                  # protected default key
        port: 8000
        resources:
          cpu: 250m
          memory: 256Mi
      app:                      # user-defined container
        resources:
          cpu: 500m
        image:
          repository: us-docker.pkg.dev/my-project/my-app
          tag: latest

  Output:
    app:
      port: 8000                # inherited from default
      resources:
        cpu: 500m               # user value wins (mergeOverwrite)
        memory: 256Mi           # inherited from default
      image:
        repository: us-docker.pkg.dev/my-project/my-app
        tag: latest
*/ -}}
{{- define "mozcloud.formatter.containers" -}}
{{- $containerValues := .containers -}}
{{- $containers := .containers -}}
{{- $defaultKey := "default" -}}
{{- /* Remove default containers key and merge with user-defined keys, if defined */ -}}
{{- if or
  (and (eq (keys $containerValues | len) 1) (eq (keys $containerValues | first) $defaultKey))
  (gt (keys $containerValues | len) 1)
}}
  {{- $containers = omit $containers $defaultKey -}}
  {{- range $name, $config := $containers -}}
    {{- $defaults := index $containerValues $defaultKey -}}
    {{- $_ := set $containers $name (mergeOverwrite ($defaults | deepCopy) $config) -}}
  {{- end -}}
{{- end -}}
{{ $containers | toYaml }}
{{- end -}}


{{- /*
Filters a hosts dict to include only entries whose "api" field matches the
given component type, returning at most one matching entry per workload. Used
by mozcloud.formatter.workloads to split a workload's hosts by API type (e.g.
separating "gateway" hosts from "ingress" hosts).

If the matching host's key is the protected name "default", it is renamed to
the workload name in the output dict.

Params:
  component (string):    (required) The API type to filter by (e.g. "gateway",
                         "ingress").
  hosts (dict):          (required) The merged hosts dict for a workload,
                         keyed by host name.
  workloadName (string): (required) The name of the workload that owns these
                         hosts. Used as a fallback key if the matched host's
                         key is the protected "default" value.

Returns:
  (string) YAML-encoded dict of filtered host configurations, keyed by host
           name.

Example:
  Input:
    component: gateway
    workloadName: my-app
    hosts:
      web-host:
        api: gateway
        domains: ["web.example.com"]
      api-host:
        api: ingress
        domains: ["api.example.com"]

  Output:
    web-host:
      api: gateway
      domains: ["web.example.com"]
*/ -}}
{{- define "mozcloud.formatter.host" -}}
{{- $component := .component -}}
{{- $hosts := .hosts -}}
{{- $output := dict -}}
{{- $workloadName := .workloadName -}}
{{- range $hostName, $hostConfig := $hosts -}}
  {{- if and (eq $hostConfig.api $component) (not (hasKey $output $workloadName)) -}}
    {{- /*
    If, for some reason, a user does not set a real name under
    .Values.workloads.hosts, use the workload name.
    */}}
    {{- if eq $hostName "default" -}}
      {{- $hostName = $workloadName -}}
    {{- end -}}
    {{- $_ := set $output $hostName $hostConfig -}}
  {{- end -}}
{{- end -}}
{{ $output | toYaml }}
{{- end -}}


{{- /*
Formatter for workload configurations. Merges each user-defined workload entry
with defaults from the protected "default" key, including nested
host defaults from the "default" key under
.Values.workloads.default.hosts, then returns the consolidated
workloads dict.

The protected key acts as a defaults template: it is stripped from the output
and its values are deep-merged as a base under each named workload. If only
the protected key is present (no user-defined workloads), it is passed through
as-is so that the single default workload still renders.

When "api" is provided, host entries within each workload are additionally
filtered to only those matching that API type using mozcloud.formatter.host.

In preview mode, workload names are prefixed with "pr<PR number>-".

A validation step ensures every workload has a "component" field set, and
fails the render with an informative error message if one is missing.

See the formatter background notes in _formatter.yaml for the full rationale.

Params:
  api (string):     (optional) If set, filters each workload's hosts to only
                    those matching this API type. Accepted values:
                    "gateway", "ingress".
  preview (dict):   (optional) Merged preview config from
                    .Values.global.preview and .Values.preview. When
                    preview.enabled and preview.pr are both set, workload
                    names are prefixed with "pr<PR number>-".
  workloads (dict): (required) The workloads dict from values (e.g.
                    .Values.workloads).

Returns:
  (string) YAML-encoded dict of consolidated workload configurations, keyed
           by workload name (with preview prefix applied if applicable).

Example:
  Input:
    workloads:
      default:                  # protected default key
        component: web
        containers:
          default:
            resources:
              cpu: 250m
              memory: 256Mi
      my-app:                   # user-defined workload
        containers:
          default:
            resources:
              cpu: 500m

  Output:
    my-app:
      component: web            # inherited from default
      containers:
        default:
          resources:
            cpu: 500m           # user value wins (mergeOverwrite)
            memory: 256Mi       # inherited from default
*/ -}}
{{- define "mozcloud.formatter.workloads" -}}
{{- $api := .api -}}
{{- $workloadValues := .workloads -}}
{{- $workloads := .workloads -}}
{{- /* Remove default workloads key and merge with user-defined keys, if defined */}}
{{- if or
  (and (eq (keys $workloadValues | len) 1) (keys $workloadValues | first) "default")
  (gt (keys $workloadValues | len) 1)
}}
  {{- $workloads = omit $workloads "default" -}}
  {{- range $name, $config := $workloads -}}
    {{- $defaultWorkload := index $workloadValues "default" -}}
    {{- /* Merge host configs with defaults */}}
    {{- $hostValues := $defaultWorkload.hosts -}}
    {{- $hosts := dict -}}
    {{- $configHosts := default (dict) $config.hosts -}}
    {{- range $hostName, $hostConfig := $configHosts -}}
      {{- $_ := set $hosts $hostName (mergeOverwrite ($hostValues.default | deepCopy) $hostConfig) -}}
    {{- end -}}
    {{- if gt (keys $hosts | len) 0 -}}
      {{- /*
      If an api parameter is provided, filter hosts to only those matching that API type.
      If no api parameter is provided, return all hosts regardless of API type.
      */ -}}
      {{- if and $api (or (eq $api "gateway") (eq $api "ingress")) -}}
        {{- $helperParams := dict "component" $api "hosts" $hosts "workloadName" $name -}}
        {{- $hosts = include "mozcloud.formatter.host" $helperParams | fromYaml -}}
      {{- end -}}
      {{- $_ := set $config "hosts" $hosts -}}
    {{- end -}}
    {{- $defaults := omit $defaultWorkload "hosts" -}}
    {{- $_ := set $workloads $name (mergeOverwrite ($defaults | deepCopy) $config) -}}
  {{- end -}}
{{- end -}}
{{- /* Apply preview prefix to workload names if in preview mode */ -}}
{{- $previewConfig := dig "preview" dict . -}}
{{- if and ($previewConfig.enabled) ($previewConfig.pr) -}}
  {{- $prefix := printf "pr%v-" $previewConfig.pr -}}
  {{- $prefixedWorkloads := dict -}}
  {{- range $name, $config := $workloads -}}
    {{- $prefixedName := printf "%s%s" $prefix $name -}}
    {{- $_ := set $prefixedWorkloads $prefixedName $config -}}
  {{- end -}}
  {{- $workloads = $prefixedWorkloads -}}
{{- end -}}
{{- /* Filter out disabled workloads */}}
{{- $filteredWorkloads := dict -}}
{{- range $name, $config := $workloads -}}
  {{- if dig "enabled" true $config -}}
    {{- $_ := set $filteredWorkloads $name $config -}}
  {{- end -}}
{{- end -}}
{{- $workloads = $filteredWorkloads -}}
{{- range $name, $config := $workloads -}}
  {{- if not $config.component -}}
    {{- $failMessage := printf "A component was not defined for workload \"%s\". You must define a component in \".Values.mozcloud.workloads.%s.component\". See values.yaml in the mozcloud chart for more details." $name $name -}}
    {{- fail $failMessage -}}
  {{- end -}}
{{- end -}}
{{ $workloads | toYaml }}
{{- end -}}
