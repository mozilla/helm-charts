# Default values for mozcloud-opentelemetry.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  mozcloud:
    app_code: mozcloud-opentelemetry
    chart: mozcloud-opentelemetry
    component_code: mozcloud-opentelemetry
    env_code: cluster
    project_id: default
    realm: cluster

collectors:
  daemonset:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      runAsUser: 10001
      runAsGroup: 10001
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    resources: {}

  gateway:
    endpoints:
      otlp:
        endpoint: "mozcloud-opentelemetry-gateway-collector"
        port: "4317"
        collectorMetricsPort: "14318"
      headless:
        endpoint: "mozcloud-opentelemetry-gateway-collector-headless"
        port: "4317"
      statsd:
        endpoint: "mozcloud-opentelemetry-gateway-statsd"
        port: "8125"
    statsdService:
      # Creates a separate ClusterIP Service with sessionAffinity: ClientIP targeting
      # the gateway collector pods. This ensures statsd traffic from the same source IP
      # is consistently routed to the same collector, so aggregation works correctly.
      enabled: true
      sessionAffinityTimeoutSeconds: 10800
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      runAsUser: 10001
      runAsGroup: 10001
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    autoscaler:
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilization: 50
      targetMemoryUtilization: 60
    resources:
      limits:
        cpu: 400m
        memory: 2Gi
      requests:
        cpu: 300m
        memory: 1536Mi      

serviceAccount:
  create: true
  name: mozcloud-otel-collector
