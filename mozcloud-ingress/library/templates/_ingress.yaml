{{- define "mozcloud-ingress-lib.ingress" -}}
{{- $name_override := default "" .nameOverride }}
{{- $provider := default "gke" .provider }}
{{- $ingressClass := default "" .ingressClass }}
{{- $backend_defaults := include "mozcloud-ingress-lib.defaults.backendConfig" . | fromYaml }}
{{- $ingresses := include "mozcloud-ingress-lib.config.ingresses" . | fromYaml }}
{{- $managed_certificates := include "mozcloud-ingress-lib.config.managedCertificates" . | fromYamlArray }}
{{- range $ingress := $ingresses.ingresses }}
{{- $certManagerConfig := default dict (default dict (first $ingress.hosts).tls).certManager }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $ingress.name }}
  labels:
    {{- $label_params := mergeOverwrite ($ | deepCopy) (dict "labels" (default (dict) $ingress.labels)) }}
    {{- $labels := include "mozcloud-ingress-lib.labels" (mergeOverwrite $ $label_params) | fromYaml }}
    {{- $labels | toYaml | nindent 4 }}
  {{- if eq $provider "gke" }}
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: {{ default "mozcloud-ingress-dev-ip-v4" $ingress.staticIpName }}
    {{- if gt (len $managed_certificates) 0 }}
    {{- $certs := list }}
    {{- range $managed_certificate := $managed_certificates }}
    {{- if and (eq $managed_certificate.ingressName $ingress.name) (or $managed_certificate.createCertificate $managed_certificate.userProvided) }}
    {{- $certs = append $certs $managed_certificate.name }}
    {{- end }}
    {{- end }}
    {{- if gt (len $certs) 0 }}
    networking.gke.io/managed-certificates: {{ join "," (uniq $certs | sortAlpha) }}
    {{- end }}
    {{- end }}
    {{- if (index $ingresses "preSharedCerts" $ingress.name) }}
    ingress.gcp.kubernetes.io/pre-shared-cert: {{ index $ingresses "preSharedCerts" $ingress.name }}
    {{- end }}
    networking.gke.io/v1beta1.FrontendConfig: {{ $ingress.name }}
  {{- else if or $ingressClass $certManagerConfig }}
  annotations:
    {{- if $ingressClass }}
    kubernetes.io/ingress.class: {{ $ingressClass | quote }}
    {{- end }}
    {{- if $certManagerConfig }}
    {{- $issuerAnnotation := ternary "cert-manager.io/issuer" "cert-manager.io/cluster-issuer" (eq $certManagerConfig.issuerKind "Issuer") }}
    {{ $issuerAnnotation }}: {{ $certManagerConfig.issuer | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if and (ne $provider "gke") $ingressClass }}
    ingressClassName: {{ $ingressClass | quote }}
  {{- end }}
  {{- if $certManagerConfig }}
    tls:
      - hosts:
          {{- range $host := $ingress.hosts }}
          {{- range $domain := $host.domains }}
          - {{ $domain | quote }}
          {{- end }}
          {{- end }}
        secretName: {{ $certManagerConfig.secretName | quote }}
  {{- end }}
  {{- if and
    (eq $provider "gke")
    (eq (len $ingress.hosts) 1)
    (eq (len (first $ingress.hosts).paths) 1)
    (eq (len (first $ingress.hosts).domains) 1)
  }}
  {{- range $host := $ingress.hosts }}
  {{- range $path := $host.paths }}
  {{- $backend := mergeOverwrite $backend_defaults (default (dict) $path.backend.config) }}
  {{- $backend_service := $path.backend.service }}
  defaultBackend:
    service:
      {{- $params := dict "backendConfig" $backend "backendService" $backend_service "ingressConfig" $ingress }}
      {{- if $name_override }}
      {{- $_ := set $params "nameOverride" $name_override }}
      {{- end }}
      name: {{ include "mozcloud-ingress-lib.config.backend.name" $params }}
      port:
        number: {{ $backend_service.port }}
  {{- end }}
  {{- end }}
  {{- else }}
    rules:
      {{- range $host := $ingress.hosts }}
      {{- range $domain := $host.domains }}
      - host: {{ $domain | quote }}
        http:
          paths:
            {{- range $path := $host.paths }}
            {{- $backend := mergeOverwrite $backend_defaults (default (dict) $path.backend.config) }}
            {{- $backend_service := $path.backend.service }}
            - path: {{ $path.path }}
              pathType: {{ $path.pathType }}
              backend:
                service:
                  {{- $params := dict "backendConfig" $backend "backendService" $backend_service "ingressConfig" $ingress }}
                  {{- if $name_override }}
                  {{- $_ := set $params "nameOverride" $name_override }}
                  {{- end }}
                  name: {{ include "mozcloud-ingress-lib.config.backend.name" $params }}
                  port:
                    number: {{ $backend_service.port }}
            {{- end }}
      {{- end }}
      {{- end }}
  {{- end }}
{{- end }}
{{- end -}}
