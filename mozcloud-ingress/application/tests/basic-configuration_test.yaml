---
suite: "mozcloud-ingress: Basic configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
# By overriding the chart version, we are preventing the labels chart from
# updating the mozcloud_chart_version label for every snapshot every time we
# bump chart versions.
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/basic-configuration.yaml
tests:
  - it: Configuration matches entire snapshot
    asserts:
      - notFailedTemplate: {}
      - matchSnapshot: {}

  - it: BackendConfig, FrontendConfig, Ingress, ManagedCertificate, and Service are configured correctly
    asserts:
      # Backend is configured correctly
      - isSubset:
          path: spec
          content:
            logging:
              enable: true
              sampleRate: 0.1
        template: backendconfig.yaml
        documentSelector:
          path: $[?(@.kind == "BackendConfig")].metadata.name
          value: test-ingress
      - notExists:
          path: spec.securityPolicy
        template: backendconfig.yaml
        documentSelector:
          path: $[?(@.kind == "BackendConfig")].metadata.name
          value: test-ingress
      # Frontend is configured correctly
      - isSubset:
          path: spec
          content:
            redirectToHttps:
              enabled: true
              responseCodeName: MOVED_PERMANENTLY_DEFAULT
            sslPolicy: mozilla-intermediate
        template: frontendconfig.yaml
        documentSelector:
          path: $[?(@.kind == "FrontendConfig")].metadata.name
          value: test-ingress
      # Ingress is configured correctly
      - isSubset:
          path: metadata.annotations
          content:
            kubernetes.io/ingress.class: gce
            kubernetes.io/ingress.global-static-ip-name: mozcloud-test-dev-ip-v4
            networking.gke.io/managed-certificates: mcrt-test-ingress-0
            networking.gke.io/v1beta1.FrontendConfig: test-ingress
        template: ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-ingress
      - isSubset:
          path: spec
          content:
            defaultBackend:
              service:
                name: test-ingress
                port:
                  number: 8080
        template: ingress.yaml
        documentSelector:
          path: $[?(@.kind == "Ingress")].metadata.name
          value: test-ingress
      # Managed certificate is configured correctly
      - lengthEqual:
          path: spec.domains
          count: 1
        template: managedcertificate.yaml
        documentSelector:
          path: $[?(@.kind == "ManagedCertificate")].metadata.name
          value: mcrt-test-ingress-0
      - contains:
          path: spec.domains
          content: "test-service.dev.test-domain.com"
        template: managedcertificate.yaml
        documentSelector:
          path: $[?(@.kind == "ManagedCertificate")].metadata.name
          value: mcrt-test-ingress-0
      # Service is configured correctly
      - contains:
          path: spec.ports
          count: 1
          content:
            name: http
            port: 8080
            protocol: TCP
            targetPort: http
        template: service.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-ingress
      - exists:
          path: spec.selector
        template: service.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-ingress
      - isNotNullOrEmpty:
          path: spec.selector
        template: service.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-ingress
      - equal:
          path: spec.type
          value: ClusterIP
        template: service.yaml
        documentSelector:
          path: $[?(@.kind == "Service")].metadata.name
          value: test-ingress
