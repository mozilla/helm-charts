---
suite: "mozcloud-ingress: Multiple hosts with mixed certNames and default naming"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/multi-host-mixed-cert-names-configuration.yaml
templates:
  - managedcertificate.yaml
  - ingress.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: ManagedCertificate is created for the user-specified cert name
    template: managedcertificate.yaml
    documentSelector:
      path: $[?(@.kind == "ManagedCertificate")].metadata.name
      value: my-legacy-cert
    asserts:
      - contains:
          path: spec.domains
          content: "custom.dev.test-domain.com"
  - it: ManagedCertificate is auto-generated for the default host
    template: managedcertificate.yaml
    documentSelector:
      path: $[?(@.kind == "ManagedCertificate")].metadata.name
      value: mcrt-test-ingress-1
    asserts:
      - contains:
          path: spec.domains
          content: "default.dev.test-domain.com"
  - it: Ingress annotation includes both custom and auto-generated cert names
    template: ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-ingress
    asserts:
      - equal:
          path: metadata.annotations["networking.gke.io/managed-certificates"]
          value: mcrt-test-ingress-1,my-legacy-cert
