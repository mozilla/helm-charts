---
suite: "mozcloud-ingress: Multiple pre-existing managed certificate names configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/multi-cert-no-create-configuration.yaml
templates:
  - managedcertificate.yaml
  - ingress.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: No ManagedCertificate resources are created
    template: managedcertificate.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: Ingress annotation references all pre-existing cert names
    template: ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-ingress
    asserts:
      - equal:
          path: metadata.annotations["networking.gke.io/managed-certificates"]
          value: cert-a,cert-b
