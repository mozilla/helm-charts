---
suite: "mozcloud-ingress: Disable managed certificate configuration"
release:
  name: mozcloud-test
  namespace: mozcloud-test-dev
chart:
  version: 1.0.0
values:
  - values/globals.yaml
  - values/disable-managed-cert-configuration.yaml
templates:
  - managedcertificate.yaml
  - ingress.yaml
tests:
  - it: Ensure no failures occur
    asserts:
      - notFailedTemplate: {}
  - it: Configuration matches entire snapshot
    asserts:
      - matchSnapshot: {}
  - it: No ManagedCertificate resources are created
    template: managedcertificate.yaml
    asserts:
      - hasDocuments:
          count: 0
  - it: Ingress annotation references the pre-existing cert name
    template: ingress.yaml
    documentSelector:
      path: $[?(@.kind == "Ingress")].metadata.name
      value: test-ingress
    asserts:
      - equal:
          path: metadata.annotations["networking.gke.io/managed-certificates"]
          value: existing-cert
