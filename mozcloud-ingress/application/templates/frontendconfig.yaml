{{- if .Values.enabled }}
{{- $ingresses := .Values.ingresses }}
{{- /* Remove default key and merge with user-defined keys, if defined */}}
{{- if or
  (and (eq (keys .Values.ingresses | len) 1) (ne (keys .Values.ingresses | first) "default"))
  (gt (keys .Values.ingresses | len) 1)
}}
  {{- $ingresses = omit .Values.ingresses "default" }}
  {{- range $name, $config := $ingresses }}
    {{- $_ := set $ingresses $name (mergeOverwrite (index $.Values.ingresses "default") $config) }}
  {{- end }}
{{- end }}
{{- $params := dict "ingressConfig" $ingresses "frontendConfig" .Values.frontendConfig "Chart" .Chart "Release" .Release }}
{{- if .Values.nameOverride }}
  {{- $_ := set $params "nameOverride" .Values.nameOverride }}
{{- end }}
{{- $label_params := include "mozcloud-ingress.labelParams" .  | fromYaml }}
{{- include "mozcloud-ingress-lib.frontendConfig" (mergeOverwrite $params $label_params) }}
{{- end }}
